<header><h2>高校野球 記念大会56代表 地区ブロック抽選・大会進行表</h2><div class="small">代表校確定 → 予備抽選 → 北海道組込 → 地区順 → A/B振分 → 分割地区 → 本抽選 → 1塁側/3塁側抽選、の順にトーナメントが完成</div></header>

<section><h3>表示</h3><div class="tabs"><button onclick="showTab('lottery')">抽選フェーズ</button><button class="secondary" onclick="showTab('bracket')">3回戦まで</button><button class="secondary" onclick="showTab('finals')">準々決勝以降</button><button class="secondary" onclick="showTab('names')">高校名変更</button><button class="secondary" onclick="showTab('list')">配置一覧</button></div><p class="small">代表校一覧・予備抽選一覧を確認しながら、次の抽選で枠が埋まっていきます。枠はA1〜A28／B1〜B28で表示します。</p></section>
</div><div>
<section id="tab-lottery"><h3>抽選フェーズ</h3><div class="note">通常大会版と同じ見え方で、56代表版の櫓を一手ずつ作ります。「次の抽選」を押すたびに、その時点の残数・残枠から抽選します。</div><div class="ctrl noPrint">
<button onclick="prevLottery()">戻る</button>
<button onclick="doNextLottery()">次へ</button>
<button class="light" onclick="resetLottery()">最初へ</button>
<button class="light" onclick="autoFinish()">最後まで</button>
</div><div id="lottery" class="phaseBox"></div></section>
<section id="tab-bracket" class="hide"><h3>3回戦まで</h3><div id="bracket"></div></section>

function slotCode(n){
 n=Number(n);
 if(!n)return '';
 return n<=28 ? 'A'+n : 'B'+(n-28);
}

function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const blocks=[{no:1,slots:[1,2,3,4],r1:[],r2:[25,26],r3:41,start:'2回戦スタート'},{no:2,slots:[5,6,7,8],r1:[],r2:[27,28],r3:42,start:'2回戦スタート'},{no:3,slots:[9,10,11,12,13,14,15,16],r1:[1,2,3,4],r2:[29,30],r3:43,start:'1回戦スタート'},{no:4,slots:[17,18,19,20,21,22,23,24],r1:[5,6,7,8],r2:[31,32],r3:44,start:'1回戦スタート'},{no:5,slots:[25,26,27,28,29,30,31,32],r1:[9,10,11,12],r2:[33,34],r3:45,start:'1回戦スタート'},{no:6,slots:[33,34,35,36,37,38,39,40],r1:[13,14,15,16],r2:[35,36],r3:46,start:'1回戦スタート'},{no:7,slots:[41,42,43,44,45,46,47,48],r1:[17,18,19,20],r2:[37,38],r3:47,start:'1回戦スタート'},{no:8,slots:[49,50,51,52,53,54,55,56],r1:[21,22,23,24],r2:[39,40],r3:48,start:'1回戦スタート'}];
function initialPairs(){let ps=[];blocks.forEach(bl=>{let s=bl.slots;if(bl.no<=2){ps.push([s[0],s[1],bl.r2[0]],[s[2],s[3],bl.r2[1]])}else{for(let i=0;i<4;i++)ps.push([s[i*2],s[i*2+1],bl.r1[i]])}});return ps}
function resetLottery(){
 let teams=sh(base.map(([pref,region])=>({pref,origRegion:region,region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1,drawSide:null,slot:null}));
 L={phase:'start',teams,groups:null,hkTarget:null,rawOrder:null,order:null,orderIndex:0,cap:{A:28,B:28},plan:[],splitRegions:[],splitTickets:{},slots:{},pools:{A:[...Array(28)].map((_,i)=>i+1),B:[...Array(28)].map((_,i)=>i+29)},drawQueue:[],drawIndex:0,sideQueue:[],sideIndex:0,sideDraw:{},log:['56代表校がすべてそろいました。'],message:'56代表校が確定した状態。トーナメント枠はまだ空です。',history:[],currentStep:'代表校がすべてそろう',lastResult:null};
 state={games:{},qf:null,sf:null};
 renderAll();
}
function groupTeams(){let g={};L.teams.forEach(t=>(g[t.region]??=[]).push(t));Object.values(g).forEach(a=>a.sort((x,y)=>x.pre-y.pre));L.groups=g}
function adjustOrderMinimal(raw){let arr=[...raw];['関東東京','九州'].forEach(k=>{let i=arr.indexOf(k);if(i>3){arr.splice(i,1);arr.splice(3,0,k)}});return arr}
function addPlan(t,side,note){L.plan.push({...t,drawSide:side,note});L.cap[side]--}

function snapshotLottery(){
 return JSON.stringify({L,state});
}
function restoreSnapshot(s){
 try{
   let o=JSON.parse(s);
   L=o.L; state=o.state||{games:{},qf:null,sf:null};
 }catch(e){}
}
function pushHistory(){
 L.history??=[];
 L.history.push(snapshotLottery());
 if(L.history.length>300)L.history.shift();
}
function prevLottery(){
 if(!L.history||!L.history.length)return;
 let s=L.history.pop();
 restoreSnapshot(s);
 renderAll();
}
function doNextLottery(){
 pushHistory();
 if(L.phase==='start'){L.phase='pre';L.currentStep='予備抽選番号の付与';L.message='予備抽選番号が決まりました。';L.lastResult={kind:'pre'};L.log.push('予備抽選番号を付与しました。');renderAll();return}
 if(L.phase==='pre'){
  groupTeams();
  let hk=(L.groups['北海道']||[]).slice().sort((a,b)=>a.pre-b.pre);
  let targets=Object.keys(L.groups).filter(r=>r!=='北海道'&&r!=='関東東京'&&r!=='九州');
  L.hkTarget=pick(targets);
  L.groups[L.hkTarget]=[...(L.groups[L.hkTarget]||[]),...hk.map(t=>({...t,region:L.hkTarget,realRegion:'北海道',note:'北海道組込'}))];
  delete L.groups['北海道'];
  L.phase='hk';L.currentStep='北海道2代表の組み込み';L.message=`北海道2代表は ${L.hkTarget} へ組み込まれました。`;L.lastResult={kind:'hk',target:L.hkTarget};L.log.push(L.message);renderAll();return
 }
 if(L.phase==='hk'){
  L.rawOrder=sh(Object.keys(L.groups));
  L.phase='rawOrder';L.currentStep='地区順抽選';L.message='地区順の素抽選を行いました。次に関東東京・九州の位置を調整します。';L.lastResult={kind:'rawOrder'};L.log.push('素の地区順：'+L.rawOrder.join(' → '));renderAll();return
 }
 if(L.phase==='rawOrder'){
  L.order=adjustOrderMinimal(L.rawOrder);
  L.phase='orderAdjusted';L.currentStep='関東東京・九州の順番調整';L.message='関東東京・九州を4番目以内へ最小繰り上げしました。';L.lastResult={kind:'orderAdjusted'};L.log.push('確定地区順：'+L.order.join(' → '));renderAll();return
 }
 if(L.phase==='orderAdjusted'){L.phase='sideAlloc';L.currentStep='A/B振分開始';L.orderIndex=0;L.message='A/B振分を開始します。';L.lastResult={kind:'sideStart'};renderAll();return}
 if(L.phase==='sideAlloc'){
  if(L.orderIndex>=L.order.length){L.phase='splitCheck';L.currentStep='分割地区の確認';L.message='A/B振分が完了しました。分割地区を確認します。';L.lastResult={kind:'splitCheck'};L.log.push(`A残 ${L.cap.A} / B残 ${L.cap.B}`);renderAll();return}
  let r=L.order[L.orderIndex++], schools=(L.groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre),n=schools.length; let beforeCap={A:L.cap.A,B:L.cap.B}; L.currentStep='A/B振分：'+r;
  let side=L.cap.A>=L.cap.B?'A':'B'; if(Math.random()<.5)side=side==='A'?'B':'A'; let other=side==='A'?'B':'A';
  if(L.cap[side]>=n){schools.forEach(t=>addPlan(t,side,r));L.message=`${r} は ${side}側 を引きました。${n}校を${side}側へ。`}
  else if(L.cap[other]>=n){schools.forEach(t=>addPlan(t,other,r));L.message=`${r} は ${side}側を引きましたが不足。${other}側へ回ります。`}
  else{
    let aNeed=Math.max(0,Math.min(n,L.cap.A)), bNeed=n-aNeed;
    L.splitRegions.push(r);
    L.splitTickets[r]=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
    schools.forEach((t,i)=>addPlan(t,L.splitTickets[r][i],r+' 分割'));
    L.message=`${r} は分割地区になりました。A${aNeed}校 / B${bNeed}校。`;
  }
  L.lastResult={
 kind:'assign',
 region:r,
 side:(schools[0]?.drawSide||side),
 size:n,
 beforeA: beforeCap.A,
 beforeB: beforeCap.B,
 capA:L.cap.A,
 capB:L.cap.B
};L.log.push(L.message);renderAll();return
 }
 if(L.phase==='splitCheck'){
  let splitSet=new Set(L.splitRegions);
  let split=L.plan.filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  let rest=L.plan.filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  L.drawQueue=[...split,...rest];
  L.phase='mainDraw';L.currentStep='本抽選開始';L.drawIndex=0;
  L.message=L.splitRegions.length?`分割地区 ${L.splitRegions.join('・')} を先に本抽選します。`:'分割地区なし。本抽選に入ります。';
  L.log.push(L.message);renderAll();return
 }
 if(L.phase==='mainDraw'){
  if(L.drawIndex>=L.drawQueue.length){
  L.phase='sideDraw';
  L.currentStep='1塁側・3塁側抽選開始';
  L.sideQueue=initialPairs().map(p=>p[2]).sort((a,b)=>a-b);
  L.sideIndex=0;
  L.message='56枠の本抽選が完了しました。続いて初戦カードごとに1塁側・3塁側を抽選します。';
  L.log.push(L.message);
  renderAll();return
 }
  let t=L.drawQueue[L.drawIndex++];
  let slot=drawSlotForTeam(t);
  if(!slot){L.message='配置不能になったため、新しい抽選を作成してください。';L.log.push(L.message);renderAll();return}
  L.currentStep=`本抽選：予備抽選${t.pre}番 ${t.pref}`;L.message=`予備抽選${t.pre}番 ${t.pref}（${t.name}）が ${t.drawSide}箱から${slotCode(slot)}を引きました。`;L.lastResult={kind:'place',team:t,slot,side:t.drawSide};
  L.log.push(L.message);renderAll();return
 }

 if(L.phase==='sideDraw'){
  if(L.sideIndex>=L.sideQueue.length){
    L.phase='done';
    L.currentStep='抽選完了';
    L.message='1塁側・3塁側抽選まで完了しました。';
    L.log.push(L.message);
    renderAll();return
  }
  let no=L.sideQueue[L.sideIndex++];
  let src=sourceForGame(no);
  if(src.length>=2){
    let arr=sh([src[0],src[1]]);
    L.sideDraw[no]=arr;
    L.currentStep='1塁側・3塁側抽選：試合'+no;
    L.message=`試合${no} は ${arr[0].label} が1塁側、${arr[1].label} が3塁側。`;
    L.lastResult={kind:'side',game:no,one:arr[0].label,three:arr[1].label};
    L.log.push(L.message);
  }
  renderAll();return
 }

}
function drawSlotForTeam(t){
 let pool=L.pools[t.drawSide];
 let candidates=[...pool];
 let valid=candidates.filter(s=>{
  let p=initialPairs().find(([a,b])=>a===s||b===s);
  if(!p)return true;
  let other=p[0]===s?p[1]:p[0];
  return !L.slots[other] || L.slots[other].origRegion!==t.origRegion;
 });
 if(!valid.length){
   L.message=`${t.pref} の配置候補がありません。初戦同地区対決を避けるため、この抽選はここで停止しました。新しい抽選を作成してください。`;
   L.log.push(L.message);
   return null;
 }
 let s=pick(valid);
 L.slots[s]={...t,slot:s};
 let idx=pool.indexOf(s); if(idx>=0)pool.splice(idx,1);
 return s;
}
function autoFinish(){let guard=0;while(L.phase!=='done'&&guard++<250){let before=Object.keys(L.slots||{}).length+'|'+L.phase+'|'+(L.message||'');doNextLottery();let after=Object.keys(L.slots||{}).length+'|'+L.phase+'|'+(L.message||'');if(before===after&&(L.phase==='mainDraw'||L.phase==='sideDraw'))break}}
function sameFirst(){let c=0,p=[];initialPairs().forEach(([a,b,g])=>{let x=L.slots[a],y=L.slots[b];if(x&&y&&x.origRegion===y.origRegion){c++;p.push(`試合${g} ${x.pref}-${y.pref}`)}});return{c,p}}

function firstRoundGameOfSlot(s){
 for(const p of initialPairs()){
   if(p[0]===s||p[1]===s)return p[2];
 }
 return null;
}
function sideOrderedSourcesForGame(no){
 let base=sourceForGame(no);
 if(no>=1&&no<=40 && L.sideDraw && L.sideDraw[no])return L.sideDraw[no];
 return base;
}
function sourceForGame(no){
 for(const bl of blocks){
  let s=bl.slots;
  if(bl.no<=2){
   if(bl.r2[0]===no)return[{slot:s[0],label:slotCode(s[0])},{slot:s[1],label:slotCode(s[1])}];
   if(bl.r2[1]===no)return[{slot:s[2],label:slotCode(s[2])},{slot:s[3],label:slotCode(s[3])}];
  }else{
   for(let i=0;i<4;i++){
    if(bl.r1[i]===no)return[{slot:s[i*2],label:slotCode(s[i*2])},{slot:s[i*2+1],label:slotCode(s[i*2+1])}];
   }
   if(bl.r2[0]===no)return[{game:bl.r1[0],label:`試合${bl.r1[0]}勝者`},{game:bl.r1[1],label:`試合${bl.r1[1]}勝者`}];
   if(bl.r2[1]===no)return[{game:bl.r1[2],label:`試合${bl.r1[2]}勝者`},{game:bl.r1[3],label:`試合${bl.r1[3]}勝者`}];
  }
  if(bl.r3===no)return[{game:bl.r2[0],label:`試合${bl.r2[0]}勝者`},{game:bl.r2[1],label:`試合${bl.r2[1]}勝者`}];
 }
 if(no>=49&&no<=52){
  let q=state.qf?.[no];
  return q?q.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'再抽選待ち'},{raw:true,label:'再抽選待ち'}];
 }
 if(no===53||no===54){
  let s=state.sf?.[no];
  return s?s.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'準決勝再抽選待ち'},{raw:true,label:'準決勝再抽選待ち'}];
 }
 if(no===55)return[{game:53,label:'試合53勝者'},{game:54,label:'試合54勝者'}];
 return[];
}
function resolve(src){if(src.raw)return src.team||null;if(src.slot)return L.slots[src.slot]||null;let g=state.games[src.game];return g?.winner||null}
function entrants(no){let src=(no>=1&&no<=40)?sideOrderedSourcesForGame(no):sourceForGame(no);return src.map((s,i)=>({team:resolve(s),label:(L.sideDraw&&L.sideDraw[no]&&no>=1&&no<=40?(i==0?'1塁側 ':'3塁側 '):'')+s.label}))}
function gstate(no){state.games[no]??={};return state.games[no]}
function cloneTeam(t){return t?{name:t.name,pref:t.pref,origRegion:t.origRegion,region:t.region,slot:t.slot,drawSide:t.drawSide}:null}
function setWinner(no,idx){let e=entrants(no)[idx];if(!e||!e.team){alert('勝者未確定です');return}state.games[no]??={};state.games[no].winner=cloneTeam(e.team);state.games[no].winnerIndex=idx;if(no>=41&&no<=48)assignQFForGame(no);if(no>=49&&no<=52)assignSFForGame(no);saveInputs();renderAll()}
function saveInputs(){document.querySelectorAll('[data-date]').forEach(i=>gstate(+i.dataset.date).date=i.value);document.querySelectorAll('[data-score]').forEach(i=>gstate(+i.dataset.score)['score'+i.dataset.idx]=i.value);document.querySelectorAll('[data-note]').forEach(i=>gstate(+i.dataset.note).note=i.value);localStorage.setItem(LS_SAVE,JSON.stringify({L,state}))}
function saveState(){saveInputs();alert('保存しました')}
function loadState(){try{let o=JSON.parse(localStorage.getItem(LS_SAVE)||'null');if(o){L=o.L;state=o.state||{games:{},qf:null,sf:null}}}catch(e){}}
function clearState(){if(confirm('進行を初期化しますか？')){state={games:{},qf:null,sf:null};localStorage.removeItem(LS_SAVE);renderAll()}}
function qEntry(no){let t=gstate(no).winner;return{label:'試合'+no+'勝者',team:cloneTeam(t),src:no}}
function blank(label){return{label,team:null,src:null}}
function ensureQF(){if(!state.qf){state.qf={49:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],50:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],51:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')],52:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')]}}}
function assignEntry(map,no,positions){let ent=qEntry(no);if(!ent.team)return false;for(let p of positions){let e=map[p.m]?.[p.i];if(e&&e.src===no){map[p.m][p.i]=ent;return false}}let empty=positions.filter(p=>!map[p.m]?.[p.i]?.src);if(!empty.length)return false;let p=pick(empty);map[p.m][p.i]=ent;return true}
function assignQFForGame(no){ensureQF();let changed=false;if(no>=41&&no<=44)changed=assignEntry(state.qf,no,[{m:49,i:0},{m:49,i:1},{m:50,i:0},{m:50,i:1}]);if(no>=45&&no<=48)changed=assignEntry(state.qf,no,[{m:51,i:0},{m:51,i:1},{m:52,i:0},{m:52,i:1}]);if(changed){state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}return changed}
function drawQF(){saveInputs();let any=false;for(let n=41;n<=48;n++)if(assignQFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の3回戦勝者はありません。')}
function clearQF(){state.qf=null;state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}
function ensureSF(){if(!state.sf){state.sf={53:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')],54:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')]}}}
function assignSFForGame(no){ensureSF();let changed=false;if(no>=49&&no<=52)changed=assignEntry(state.sf,no,[{m:53,i:0},{m:53,i:1},{m:54,i:0},{m:54,i:1}]);if(changed){[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}return changed}
function drawSF(){saveInputs();let any=false;for(let n=49;n<=52;n++)if(assignSFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の準々決勝勝者はありません。')}
function clearSF(){state.sf=null;[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}
function row(no,e,idx,lot=false){let t=e.team,gs=gstate(no),picked=gs.winnerIndex==idx;return `<div class="team ${idx==0?'side1':'side3'} ${picked?'winrow':''}"><span class="src">${esc(lot?(e.label||''):(idx==0?'1塁側':'3塁側'))}</span><span>${t?`<span class="tn">${esc(t.name)}</span> <span class="pref">(${esc(t.pref)})</span>`:`<span class="pending">${lot?'抽選待ち':'未定'}</span>`}</span>${lot?'<span></span>':`<button class="pick ${picked?'picked':''}" onclick="setWinner(${no},${idx})">勝</button>`}</div>`}
function game(no,title,cls){let gs=gstate(no),es=entrants(no);return `<div class="game ${cls}"><div class="gl"><span>試合${no}</span><span>${esc(title)}</span></div><div class="meta"><input class="date" data-date="${no}" placeholder="8/6 10:00" value="${esc(gs.date||'')}" onchange="saveInputs()"><span>スコア</span><input class="score" data-score="${no}" data-idx="0" value="${esc(gs.score0||'')}" onchange="saveInputs()"> - <input class="score" data-score="${no}" data-idx="1" value="${esc(gs.score1||'')}" onchange="saveInputs()"><input class="noteInput" data-note="${no}" placeholder="延長12回TB等" value="${esc(gs.note||'')}" onchange="saveInputs()"></div>${row(no,es[0]||{},0)}${row(no,es[1]||{},1)}</div>`}
function gameLot(no,title,cls,highlight=null){let src=sideOrderedSourcesForGame(no),es=src.map((s,i)=>({team:s.slot?L.slots[s.slot]:null,label:(L.sideDraw&&L.sideDraw[no]?(i==0?'1塁側 ':'3塁側 '):'')+s.label,slot:s.slot}));let hi=(es[0]?.slot==highlight||es[1]?.slot==highlight)?' highlightSlot':'';return `<div class="game ${cls}${hi}"><div class="gl"><span>試合${no}</span><span>${esc(title)}</span></div>${row(no,es[0]||{},0,true)}${row(no,es[1]||{},1,true)}</div>`}
function blockHTML(bl,lot=false,highlight=null){let gf=lot?((n,t,c)=>gameLot(n,t,c,highlight)):game;let left='',mid='';if(bl.no<=2){mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}else{left=bl.r1.map(n=>gf(n,'1回戦','r1')).join('');mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}return `<div class="block"><div class="bt"><span>第${bl.no}ブロック</span><span>${bl.no<=2?'2回戦スタート':'1回戦スタート'}</span></div><div class="tree"><div class="col">${left}</div><div class="col">${mid}</div><div class="col">${gf(bl.r3,'3回戦','r3')}</div></div></div>`}
function renderBracket(){bracket.innerHTML='<div class="note"><span class="pill" style="background:var(--r1)">1回戦1〜24</span><span class="pill" style="background:var(--r2)">2回戦25〜40</span><span class="pill" style="background:var(--r3)">3回戦41〜48</span></div><div class="blocks">'+blocks.map(b=>blockHTML(b)).join('')+'</div>'}
function renderFinals(){let h='<div class="note"><span class="pill" style="background:var(--qf)">準々決勝49〜52</span><span class="pill" style="background:var(--sf)">準決勝53〜54</span><span class="pill" style="background:var(--final)">決勝55</span></div><div class="finalGrid">';for(let n=49;n<=52;n++)h+=game(n,'準々決勝','qf');h+=game(53,'準決勝','sf')+game(54,'準決勝','sf')+game(55,'決勝','final')+'</div>';finals.innerHTML=h}
function renderList(){let h='<table><tr><th>枠</th><th>A/B</th><th>校名</th><th>代表</th><th>地区</th><th>予備</th></tr>';for(let i=1;i<=56;i++){let t=L.slots[i];h+=`<tr class="${t?.drawSide==='A'?'Arow':t?.drawSide==='B'?'Brow':''}"><td>${slotCode(i)}</td><td>${esc(t?.drawSide||'')}</td><td>${esc(t?.name||'')}</td><td>${esc(t?.pref||'')}</td><td>${esc(t?.origRegion||'')}</td><td>${esc(t?.pre||'')}</td></tr>`}list.innerHTML=h+'</table>'}
function lastPlacedSlot(){
 let vals=Object.values(L.slots||{});
 if(!vals.length)return null;
 let maxPre=-1,last=null;
 vals.forEach(t=>{if(t.pre>maxPre){maxPre=t.pre;last=t.slot}});
 return last;
}

function teamListPanel(){
 let rows=(L.teams||[]).slice().sort((a,b)=>a.pref.localeCompare(b.pref,'ja')).map(t=>`<tr><td>${esc(t.pref)}</td><td>${esc(t.name)}</td><td>${esc(t.origRegion)}</td></tr>`).join('');
 return `<div class="miniTable"><table><tr><th>代表</th><th>高校名</th><th>地区</th></tr>${rows}</table></div>`;
}
function preListPanel(){
 let rows=(L.teams||[]).slice().sort((a,b)=>a.pre-b.pre).map(t=>`<tr><td>${t.pre}</td><td>${esc(t.name)}</td><td>${esc(t.pref)}</td><td>${esc(t.origRegion)}</td></tr>`).join('');
 return `<div class="miniTable"><table><tr><th>予備</th><th>高校名</th><th>代表</th><th>地区</th></tr>${rows}</table></div>`;
}
function regionOrderPanel(){
 if(!L.order)return '';
 return `<div class="miniTable"><table><tr><th>順</th><th>地区</th><th>校数</th><th>状態</th><th>A残</th><th>B残</th></tr>${L.order.map((r,i)=>{
   let st=i<L.orderIndex?'完了':i===L.orderIndex?'次':'待機';
   let cnt=(L.groups&&L.groups[r])?L.groups[r].length:'';
   let a=(i===L.orderIndex)?(L.cap?.A??''):'';
   let b=(i===L.orderIndex)?(L.cap?.B??''):'';
   return `<tr><td>${i+1}</td><td>${esc(r)}</td><td>${cnt}</td><td>${st}</td><td>${a}</td><td>${b}</td></tr>`;
 }).join('')}</table></div>`;
}
function mainDrawOrderPanel(){
 if(!L.drawQueue||!L.drawQueue.length)return '';
 let rows=L.drawQueue.map((t,i)=>{
  let st=i<L.drawIndex?'完了':i===L.drawIndex?'次':'待機';
  return `<tr><td>${i+1}</td><td>${t.pre}</td><td>${esc(t.name)}</td><td>${esc(t.pref)}</td><td>${esc(t.drawSide)}</td><td>${st}</td></tr>`;
 }).join('');
 return `<div class="miniTable"><table><tr><th>順</th><th>予備</th><th>高校名</th><th>代表</th><th>箱</th><th>状態</th></tr>${rows}</table></div>`;
}
function sideDrawOrderPanel(){
 if(!L.sideQueue||!L.sideQueue.length)return '';
 return `<div class="miniTable"><table><tr><th>順</th><th>試合</th><th>状態</th></tr>${L.sideQueue.map((n,i)=>{
   let st=i<L.sideIndex?'完了':i===L.sideIndex?'次':'待機';
   return `<tr><td>${i+1}</td><td>試合${n}</td><td>${st}</td></tr>`;
 }).join('')}</table></div>`;
}
function lotteryExtraPanel(){
 if(L.phase==='start')return teamListPanel();
 if(['pre','hk','rawOrder','orderAdjusted'].includes(L.phase))return preListPanel();
 if(['sideAlloc','splitCheck'].includes(L.phase))return regionOrderPanel();
 if(L.phase==='mainDraw')return mainDrawOrderPanel();
 if(L.phase==='sideDraw'||L.phase==='done')return sideDrawOrderPanel();
 return '';
}
function resultCard(){
 let r=L.lastResult;
 if(!r)return '';
 if(r.kind==='place')return `<div class="cards"><div class="card nowCard"><b>${slotCode(r.slot)}</b><br>${esc(r.team.name)}<br><span class="small">${esc(r.team.pref)}／予備${r.team.pre}番／${esc(r.side)}箱</span></div></div>`;
 if(r.kind==='side')return `<div class="cards"><div class="card nowCard"><b>試合${r.game}</b><br>1塁側：${esc(r.one)}<br>3塁側：${esc(r.three)}</div></div>`;
 if(r.kind==='assign')return `<div class="cards"><div class="card nowCard"><b>${esc(r.region)}</b><br>${esc(r.side)}側へ ${r.size||''}校振分</div><div class="card"><b>振分前</b><br>A ${r.beforeA} / B ${r.beforeB}</div><div class="card"><b>振分後</b><br>A ${r.capA} / B ${r.capB}</div></div>`;
 if(r.kind==='hk')return `<div class="cards"><div class="card nowCard"><b>北海道組込</b><br>${esc(r.target)}へ2校1組で仮編入</div></div>`;
 return '';
}
function walkSteps(){
 let items=[
  ['start','代表校がすべてそろう'],
  ['pre','予備抽選番号がふられる'],
  ['hk','北海道2代表の組み込み抽選'],
  ['rawOrder','地区順を決める抽選'],
  ['orderAdjusted','地区順確定・順番調整'],
  ['sideAlloc','A/B振分'],
  ['splitCheck','分割地区の発生判定'],
  ['mainDraw','本抽選'],
  ['sideDraw','1塁側/3塁側抽選'],
  ['done','抽選完了']
 ];
 let idx=items.findIndex(x=>x[0]===L.phase);
 if(idx<0)idx=0;
 return `<div class="walkSteps">${items.map((x,i)=>`<div class="stepItem ${i<idx?'done':i===idx?'active':'todo'}">${i+1}. ${x[1]}</div>`).join('')}</div>`;
}
function stepNumber(){
 let order=['start','pre','hk','rawOrder','orderAdjusted','sideAlloc','splitCheck','mainDraw','sideDraw','done'];
 let base=order.indexOf(L.phase); if(base<0)base=0;
 let total=10;
 return {now:Math.min(base+1,total),total};
}
function currentCard(){
 let placed=Object.keys(L.slots||{}).length;
 let s=sameFirst();
 return `<div class="cards">
 <div class="card"><b>配置</b><br>${placed}/56</div>
 <div class="card"><b>同地区初戦</b><br>${s.c}件</div>
 <div class="card"><b>残り枠</b><br>A ${L.pools?.A?.length??28} / B ${L.pools?.B?.length??28}</div>
 <div class="card"><b>現在</b><br>${esc(L.currentStep||'')}</div>
 </div>`;
}
function renderLottery(){
 let placed=Object.keys(L.slots||{}).length;
 let prog=stepNumber();
 let pct=Math.min(100,Math.round((prog.now-1)/(prog.total-1)*100));
 let last=lastPlacedSlot();

 // 通常大会版の構成に寄せる：
 // タイトル → 説明 → その手順の一覧/表 → 現在のトーナメント表 → 手順一覧
 lottery.innerHTML=`<div class="small">手順 ${prog.now} / ${prog.total}</div>
 <div class="bar"><span style="width:${pct}%"></span></div>
 <div class="bigStep">${esc(L.currentStep||'抽選フェーズ')}</div>
 <div class="note">${esc(L.message||'')}</div>
 ${lotteryExtraPanel()}
 ${resultCard()}
 <div class="walkNow"><h4>現在のトーナメント表</h4>
 <div class="bracket"><div class="blocks">${blocks.map(b=>blockHTML(b,true,last)).join('')}</div></div></div>
 ${walkSteps()}`;
}

function recentStepCards(){
 let logs=(L.log||[]).slice(-6);
 return '<div class="stepList">'+logs.map((x,i)=>`<div class="stepItem ${i==logs.length-1?'active':'done'}">${esc(x)}</div>`).join('')+'</div>';
}
function renderLottery(){
 let placed=Object.keys(L.slots||{}).length;
 let pct=Math.min(100,(placed/56)*100);
 let last=lastPlacedSlot();
 lottery.innerHTML=`<div class="small">配置済み ${placed}/56</div>
 <div class="bar"><span style="width:${pct}%"></span></div>
 <div class="bigStep">${esc(L.message||'')}</div>
 <div class="note">未来の抽選結果は保持せず、ボタンを押した時点で次の抽選を行います。</div>
 ${recentStepCards()}
 <h4>現在のトーナメント表</h4>
 <div class="bracket"><div class="blocks">${blocks.map(b=>blockHTML(b,true,last)).join('')}</div></div>`;

function renderAll(){let s=sameFirst(),n=Object.keys(L.slots||{}).length;summary.innerHTML=`配置 ${n}/56 ${n===56?'<span class=ok>OK</span>':''}<br>同地区初戦：<b>${s.c}</b>件<br>${s.p.join('<br>')||'なし'}${L.hkTarget?'<br>北海道組込：'+esc(L.hkTarget):''}${L.splitRegions?.length?'<br>分割地区：'+esc(L.splitRegions.join('・')):''}`;renderLottery();renderBracket();renderFinals();renderList()}
function stats(){alert('逐次抽選版では、実際に「1000回検証」で確認してください。配置時は同地区初戦を許可しない処理にしています。')}
function showTab(n){['lottery','bracket','finals','names','list'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('hide',x!==n));if(n==='names')renderNameEditor()}
renderNameEditor();resetLottery();
