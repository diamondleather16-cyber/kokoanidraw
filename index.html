<style>

<body>
<header><h2>高校野球 記念大会56代表 抽選・大会進行表</h2><div class="small">通常大会版UI踏襲／56代表櫓／初戦同地区なし／手順再現安定版</div></header>
<main><div class="grid"><div>
<section class="sticky"><div class="ctrl"><button onclick="resetLottery()">新しい抽選</button><button class="secondary" onclick="autoFinish()">最後まで</button><button class="light" onclick="saveState()">進行保存</button><button class="light" onclick="loadState();renderAll()">進行読込</button><button class="danger" onclick="clearState()">進行初期化</button></div><div id="summary" style="margin-top:8px"></div></section>
<section><h3>表示</h3><div class="tabs"><button onclick="showTab('lottery')">抽選フェーズ</button><button class="secondary" onclick="showTab('bracket')">3回戦まで</button><button class="secondary" onclick="showTab('finals')">準々決勝以降</button><button class="secondary" onclick="showTab('names')">高校名変更</button><button class="secondary" onclick="showTab('list')">配置一覧</button></div><p class="small">左上には未確定事項を出さないようにしました。分割地区や北海道組込も、抽選後に初めて表示されます。</p></section>
</div><div>
<section id="tab-lottery"><h3>抽選フェーズ</h3><div class="note">「抽選する」を押すたびに、その時点の残数・残枠から次の抽選を行います。あらかじめ全結果を作って隠している方式ではありません。</div><div class="ctrl"><button class="green" onclick="doNextLottery()">抽選する</button></div><div id="lottery"></div></section>
<section id="tab-bracket" class="hide"><h3>3回戦まで</h3><div id="bracket"></div></section>
<section id="tab-finals" class="hide"><h3>準々決勝以降</h3><div class="ctrl"><button onclick="drawQF()">準々決勝の未抽選分を確定</button><button class="light" onclick="clearQF()">準々決勝解除</button><button onclick="drawSF()">準決勝の未抽選分を確定</button><button class="light" onclick="clearSF()">準決勝解除</button></div><div id="finals"></div></section>
<section id="tab-names" class="hide"><h3>高校名変更</h3><div class="ctrl"><button onclick="randomSchoolNames()">仮校名をランダム投入</button><button onclick="saveNames();resetLottery()">保存して新規抽選</button><button class="light" onclick="resetNames();resetLottery()">校名初期化</button></div><div id="nameEditor"></div></section>
<section id="tab-list" class="hide"><h3>配置一覧</h3><div id="list"></div></section>
</div></div>

<script>
const base=[["北北海道","北海道"],["南北海道","北海道"],["青森","東北"],["岩手","東北"],["秋田","東北"],["山形","東北"],["宮城","東北"],["福島","東北"],["茨城","関東東京"],["栃木","関東東京"],["群馬","関東東京"],["北埼玉","関東東京"],["南埼玉","関東東京"],["東千葉","関東東京"],["西千葉","関東東京"],["北神奈川","関東東京"],["南神奈川","関東東京"],["山梨","関東東京"],["東東京","関東東京"],["西東京","関東東京"],["新潟","北信越"],["長野","北信越"],["富山","北信越"],["石川","北信越"],["福井","北信越"],["岐阜","東海"],["静岡","東海"],["東愛知","東海"],["西愛知","東海"],["三重","東海"],["滋賀","近畿"],["京都","近畿"],["北大阪","近畿"],["南大阪","近畿"],["東兵庫","近畿"],["西兵庫","近畿"],["奈良","近畿"],["和歌山","近畿"],["鳥取","中国"],["島根","中国"],["岡山","中国"],["広島","中国"],["山口","中国"],["香川","四国"],["徳島","四国"],["愛媛","四国"],["高知","四国"],["北福岡","九州"],["南福岡","九州"],["佐賀","九州"],["長崎","九州"],["熊本","九州"],["大分","九州"],["宮崎","九州"],["鹿児島","九州"],["沖縄","九州"]];
const schoolPool={
"北北海道":["旭川実","旭川志峯","クラーク記念国際","白樺学園","帯広農","遠軽"],"南北海道":["北海","札幌日大","東海大札幌","駒大苫小牧","北海道栄","札幌大谷"],"青森":["青森山田","八戸学院光星","弘前学院聖愛","八戸工大一","青森北"],"岩手":["花巻東","盛岡大付","一関学院","専大北上","盛岡中央"],"秋田":["金足農","明桜","秋田商","能代松陽","秋田中央"],"山形":["鶴岡東","日大山形","酒田南","羽黒","山形中央"],"宮城":["仙台育英","東北","東陵","利府","聖和学園"],"福島":["聖光学院","学法石川","日大東北","光南","東日本国際大昌平"],"茨城":["常総学院","霞ヶ浦","土浦日大","鹿島学園","水城"],"栃木":["作新学院","文星芸大付","国学院栃木","佐野日大","青藍泰斗"],"群馬":["健大高崎","前橋育英","桐生第一","樹徳","高崎健康福祉大高崎"],"埼玉":["浦和学院","花咲徳栄","聖望学園","昌平","山村学園"],"千葉":["木更津総合","専大松戸","習志野","市船橋","拓大紅陵"],"神奈川":["横浜","東海大相模","慶應","桐光学園","横浜隼人"],"山梨":["山梨学院","東海大甲府","駿台甲府","帝京三","日本航空"],"東東京":["関東一","帝京","二松学舎大付","修徳","城東"],"西東京":["早実","日大三","東海大菅生","国士舘","創価"],"新潟":["日本文理","中越","帝京長岡","関根学園","新潟明訓"],"長野":["松商学園","上田西","佐久長聖","東京都市大塩尻","長野日大"],"富山":["高岡商","富山商","富山第一","未来富山","新湊"],"石川":["星稜","日本航空石川","遊学館","小松大谷","金沢"],"福井":["敦賀気比","福井商","北陸","啓新","福井工大福井"],"岐阜":["県岐阜商","大垣日大","岐阜第一","中京","帝京大可児"],"静岡":["静岡","常葉大菊川","静岡商","加藤学園","日大三島"],"愛知":["中京大中京","東邦","愛工大名電","享栄","至学館"],"三重":["三重","津田学園","海星","いなべ総合","宇治山田商"],"滋賀":["近江","滋賀学園","比叡山","彦根東","綾羽"],"京都":["京都国際","龍谷大平安","立命館宇治","京都外大西","鳥羽"],"大阪":["大阪桐蔭","履正社","関大北陽","興國","大阪学院大高"],"兵庫":["報徳学園","社","神戸国際大付","東洋大姫路","明石商"],"奈良":["智辯学園","天理","奈良大付","高田商","橿原"],"和歌山":["智辯和歌山","市和歌山","和歌山東","耐久","箕島"],"鳥取":["鳥取城北","米子松蔭","鳥取商","倉吉東"],"島根":["大社","開星","浜田","益田東"],"岡山":["創志学園","関西","おかやま山陽","倉敷商","玉野光南"],"広島":["広陵","広島商","新庄","盈進","呉港"],"山口":["宇部鴻城","下関国際","高川学園","南陽工"],"香川":["英明","高松商","尽誠学園","寒川"],"徳島":["鳴門","徳島商","生光学園","池田"],"愛媛":["済美","松山商","今治西","聖カタリナ"],"高知":["明徳義塾","高知","高知中央","岡豊"],"福岡":["九州国際大付","福岡大大濠","西日本短大付","東筑","筑陽学園"],"佐賀":["佐賀北","龍谷","有田工","神埼清明"],"長崎":["海星","創成館","長崎商","大崎"],"熊本":["熊本工","東海大熊本星翔","九州学院","文徳"],"大分":["明豊","大分舞鶴","津久見","藤蔭"],"宮崎":["宮崎商","富島","日南学園","都城東"],"鹿児島":["神村学園","鹿児島実","樟南","鹿屋中央"],"沖縄":["沖縄尚学","興南","エナジックスポーツ","ウェルネス沖縄"]};
const alias={"北埼玉":"埼玉","南埼玉":"埼玉","東千葉":"千葉","西千葉":"千葉","北神奈川":"神奈川","南神奈川":"神奈川","東愛知":"愛知","西愛知":"愛知","北大阪":"大阪","南大阪":"大阪","東兵庫":"兵庫","西兵庫":"兵庫","北福岡":"福岡","南福岡":"福岡"};
const LS_NAMES='kokoyakyu_memorial56_true_names_v1', LS_SAVE='kokoyakyu_memorial56_true_save_v1';
let L={}, state={games:{},qf:null,sf:null};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function getNames(){try{return JSON.parse(localStorage.getItem(LS_NAMES)||'{}')}catch(e){return {}}}
function teamName(p){let n=getNames()[p];return n&&n.trim()?n.trim():p+'代表'}
function randomSchoolNames(){let o={};base.forEach(([p])=>{let key=alias[p]||p,a=schoolPool[p]||schoolPool[key]||[p+'代表'];o[p]=pick(a)});localStorage.setItem(LS_NAMES,JSON.stringify(o));renderNameEditor();resetLottery()}
function saveNames(){let o={};document.querySelectorAll('[data-pref-input]').forEach(i=>{if(i.value.trim())o[i.dataset.prefInput]=i.value.trim()});localStorage.setItem(LS_NAMES,JSON.stringify(o))}
function resetNames(){localStorage.removeItem(LS_NAMES);renderNameEditor()}
function renderNameEditor(){let n=getNames(),h='<table><tr><th>代表</th><th>地区</th><th>高校名</th></tr>';base.forEach(([p,r])=>h+=`<tr><td>${esc(p)}</td><td>${esc(r)}</td><td><input data-pref-input="${esc(p)}" value="${esc(n[p]||p+'代表')}"></td></tr>`);nameEditor.innerHTML=h+'</table>'}
const blocks=[{no:1,slots:[1,2,3,4],r1:[],r2:[25,26],r3:41,start:'2回戦スタート'},{no:2,slots:[5,6,7,8],r1:[],r2:[27,28],r3:42,start:'2回戦スタート'},{no:3,slots:[9,10,11,12,13,14,15,16],r1:[1,2,3,4],r2:[29,30],r3:43,start:'1回戦スタート'},{no:4,slots:[17,18,19,20,21,22,23,24],r1:[5,6,7,8],r2:[31,32],r3:44,start:'1回戦スタート'},{no:5,slots:[25,26,27,28,29,30,31,32],r1:[9,10,11,12],r2:[33,34],r3:45,start:'1回戦スタート'},{no:6,slots:[33,34,35,36,37,38,39,40],r1:[13,14,15,16],r2:[35,36],r3:46,start:'1回戦スタート'},{no:7,slots:[41,42,43,44,45,46,47,48],r1:[17,18,19,20],r2:[37,38],r3:47,start:'1回戦スタート'},{no:8,slots:[49,50,51,52,53,54,55,56],r1:[21,22,23,24],r2:[39,40],r3:48,start:'1回戦スタート'}];
function initialPairs(){let ps=[];blocks.forEach(bl=>{let s=bl.slots;if(bl.no<=2){ps.push([s[0],s[1],bl.r2[0]],[s[2],s[3],bl.r2[1]])}else{for(let i=0;i<4;i++)ps.push([s[i*2],s[i*2+1],bl.r1[i]])}});return ps}
function resetLottery(){
 let teams=sh(base.map(([pref,region])=>({pref,origRegion:region,region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1,drawSide:null,slot:null}));
 L={phase:'start',teams,groups:null,hkTarget:null,rawOrder:null,order:null,orderIndex:0,cap:{A:28,B:28},plan:[],splitRegions:[],splitTickets:{},slots:{},pools:{A:[...Array(28)].map((_,i)=>i+1),B:[...Array(28)].map((_,i)=>i+29)},drawQueue:[],drawIndex:0,log:['56代表がそろいました。'],message:'代表校が出そろいました。次に予備抽選番号を付与します。'};
 state={games:{},qf:null,sf:null};
 renderAll();
}
function groupTeams(){let g={};L.teams.forEach(t=>(g[t.region]??=[]).push(t));Object.values(g).forEach(a=>a.sort((x,y)=>x.pre-y.pre));L.groups=g}
function adjustOrderMinimal(raw){let arr=[...raw];['関東東京','九州'].forEach(k=>{let i=arr.indexOf(k);if(i>3){arr.splice(i,1);arr.splice(3,0,k)}});return arr}
function addPlan(t,side,note){L.plan.push({...t,drawSide:side,note});L.cap[side]--}
function doNextLottery(){
 if(L.phase==='start'){L.phase='pre';L.message='予備抽選番号が決まりました。';L.log.push('予備抽選番号を付与しました。');renderAll();return}
 if(L.phase==='pre'){
  groupTeams();
  let hk=(L.groups['北海道']||[]).slice().sort((a,b)=>a.pre-b.pre);
  let targets=Object.keys(L.groups).filter(r=>r!=='北海道'&&r!=='関東東京'&&r!=='九州');
  L.hkTarget=pick(targets);
  L.groups[L.hkTarget]=[...(L.groups[L.hkTarget]||[]),...hk.map(t=>({...t,region:L.hkTarget,realRegion:'北海道',note:'北海道組込'}))];
  delete L.groups['北海道'];
  L.phase='hk';L.message=`北海道2代表は ${L.hkTarget} へ組み込まれました。`;L.log.push(L.message);renderAll();return
 }
 if(L.phase==='hk'){
  L.rawOrder=sh(Object.keys(L.groups));
  L.phase='rawOrder';L.message='地区順の素抽選を行いました。次に関東東京・九州の位置を調整します。';L.log.push('素の地区順：'+L.rawOrder.join(' → '));renderAll();return
 }
 if(L.phase==='rawOrder'){
  L.order=adjustOrderMinimal(L.rawOrder);
  L.phase='orderAdjusted';L.message='関東東京・九州を4番目以内へ最小繰り上げしました。';L.log.push('確定地区順：'+L.order.join(' → '));renderAll();return
 }
 if(L.phase==='orderAdjusted'){L.phase='sideAlloc';L.orderIndex=0;L.message='A/B振分を開始します。';renderAll();return}
 if(L.phase==='sideAlloc'){
  if(L.orderIndex>=L.order.length){L.phase='splitCheck';L.message='A/B振分が完了しました。分割地区を確認します。';L.log.push(`A残 ${L.cap.A} / B残 ${L.cap.B}`);renderAll();return}
  let r=L.order[L.orderIndex++], schools=(L.groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre),n=schools.length;
  let side=L.cap.A>=L.cap.B?'A':'B'; if(Math.random()<.5)side=side==='A'?'B':'A'; let other=side==='A'?'B':'A';
  if(L.cap[side]>=n){schools.forEach(t=>addPlan(t,side,r));L.message=`${r} は ${side}側 を引きました。${n}校を${side}側へ。`}
  else if(L.cap[other]>=n){schools.forEach(t=>addPlan(t,other,r));L.message=`${r} は ${side}側を引きましたが不足。${other}側へ回ります。`}
  else{
    let aNeed=Math.max(0,Math.min(n,L.cap.A)), bNeed=n-aNeed;
    L.splitRegions.push(r);
    L.splitTickets[r]=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
    schools.forEach((t,i)=>addPlan(t,L.splitTickets[r][i],r+' 分割'));
    L.message=`${r} は分割地区になりました。A${aNeed}校 / B${bNeed}校。`;
  }
  L.log.push(L.message);renderAll();return
 }

function createStableDraw(){
 for(let attempt=0;attempt<3000;attempt++){
   let teams=sh(base.map(([pref,region])=>({pref,origRegion:region,region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1,drawSide:null,slot:null}));
   let groups={}; teams.forEach(t=>(groups[t.region]??=[]).push(t)); Object.values(groups).forEach(a=>a.sort((x,y)=>x.pre-y.pre));
   let hk=(groups['北海道']||[]).slice().sort((a,b)=>a.pre-b.pre);
   let targets=Object.keys(groups).filter(r=>r!=='北海道'&&r!=='関東東京'&&r!=='九州');
   let hkTarget=pick(targets);
   groups[hkTarget]=[...(groups[hkTarget]||[]),...hk.map(t=>({...t,region:hkTarget,realRegion:'北海道',note:'北海道組込'}))];
   delete groups['北海道'];
   let rawOrder=sh(Object.keys(groups));
   let order=adjustOrderMinimal(rawOrder);
   let cap={A:28,B:28}, plan=[], allocRows=[], splitRegions=[];
   function add(t,side,note){plan.push({...t,drawSide:side,note});cap[side]--}
   let broken=false;
   for(let idx=0;idx<order.length;idx++){
    let r=order[idx], schools=(groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre), n=schools.length;
    let before={A:cap.A,B:cap.B};
    let side=cap.A>=cap.B?'A':'B'; if(Math.random()<.5)side=side==='A'?'B':'A';
    let other=side==='A'?'B':'A';
    if(cap[side]>=n){schools.forEach(t=>add(t,side,r)); allocRows.push({region:r,side,n,before,after:{A:cap.A,B:cap.B},split:false,schools});}
    else if(cap[other]>=n){schools.forEach(t=>add(t,other,r)); allocRows.push({region:r,side:other,n,before,after:{A:cap.A,B:cap.B},split:false,schools,forced:true});}
    else{
      // split current district exactly into remaining A and B capacity needed for this district
      let aNeed=Math.max(0,Math.min(n,cap.A));
      let bNeed=n-aNeed;
      if(bNeed>cap.B){broken=true;break}
      splitRegions.push(r);
      let tickets=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
      schools.forEach((t,i)=>add(t,tickets[i],r+' 分割'));
      allocRows.push({region:r,side:'分割',n,before,after:{A:cap.A,B:cap.B},split:true,schools,tickets});
    }
   }
   if(broken||cap.A!==0||cap.B!==0)continue;
   let pools={A:[...Array(28)].map((_,i)=>i+1),B:[...Array(28)].map((_,i)=>i+29)}, slots={}, placements=[];
   let splitSet=new Set(splitRegions);
   let drawOrder=[...plan.filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre),...plan.filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre)];
   for(let t of drawOrder){
    let candidates=[...pools[t.drawSide]];
    let valid=candidates.filter(s=>{
      let p=initialPairs().find(([a,b])=>a===s||b===s);
      if(!p)return true;
      let other=p[0]===s?p[1]:p[0];
      return !slots[other] || slots[other].origRegion!==t.origRegion;
    });
    if(!valid.length){broken=true;break}
    let s=pick(valid);
    slots[s]={...t,slot:s};
    pools[t.drawSide].splice(pools[t.drawSide].indexOf(s),1);
    placements.push({...t,slot:s});
   }
   if(broken)continue;
   let d={teams,groups,hkTarget,rawOrder,order,allocRows,splitRegions,slots,placements,sideDraw:{},steps:[]};
   let c=0; initialPairs().forEach(([a,b])=>{if(slots[a]&&slots[b]&&slots[a].origRegion===slots[b].origRegion)c++});
   if(Object.keys(slots).length===56&&c===0)return d;
 }
 return null;
}

function visibleSlotObj(){let o={};Object.keys(L.visibleSlots||{}).forEach(k=>{if(L.visibleSlots[k])o[k]=L.slots[k]});return o}
function sameFirst(){let c=0,p=[];initialPairs().forEach(([a,b,g])=>{let x=L.slots[a],y=L.slots[b];if(x&&y&&x.origRegion===y.origRegion){c++;p.push(`試合${g} ${x.pref}-${y.pref}`)}});return{c,p}}
function sourceForGame(no){
 for(const bl of blocks){let s=bl.slots;if(bl.no<=2){if(bl.r2[0]===no)return[{slot:s[0],label:slotCode(s[0])},{slot:s[1],label:slotCode(s[1])}];if(bl.r2[1]===no)return[{slot:s[2],label:slotCode(s[2])},{slot:s[3],label:slotCode(s[3])}]}
 else{for(let i=0;i<4;i++)if(bl.r1[i]===no)return[{slot:s[i*2],label:slotCode(s[i*2])},{slot:s[i*2+1],label:slotCode(s[i*2+1])}];if(bl.r2[0]===no)return[{game:bl.r1[0],label:`試合${bl.r1[0]}勝者`},{game:bl.r1[1],label:`試合${bl.r1[1]}勝者`}];if(bl.r2[1]===no)return[{game:bl.r1[2],label:`試合${bl.r1[2]}勝者`},{game:bl.r1[3],label:`試合${bl.r1[3]}勝者`}]}if(bl.r3===no)return[{game:bl.r2[0],label:`試合${bl.r2[0]}勝者`},{game:bl.r2[1],label:`試合${bl.r2[1]}勝者`}]}if(no>=49&&no<=52){let q=state.qf?.[no];return q?q.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'再抽選待ち'},{raw:true,label:'再抽選待ち'}]}if(no===53||no===54){let s=state.sf?.[no];return s?s.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'準決勝再抽選待ち'},{raw:true,label:'準決勝再抽選待ち'}]}if(no===55)return[{game:53,label:'試合53勝者'},{game:54,label:'試合54勝者'}];return[]}
function sideOrderedSourcesForGame(no){
 let base=sourceForGame(no);
 if(L.visibleSides&&L.visibleSides[no]&&L.sideDraw&&L.sideDraw[no])return L.sideDraw[no];
 return base;
}
function resolve(src){if(src.raw)return src.team||null;if(src.slot)return L.slots[src.slot]||null;let g=state.games[src.game];return g?.winner||null}
function entrants(no){let src=(no>=1&&no<=40)?sideOrderedSourcesForGame(no):sourceForGame(no);return src.map((s,i)=>({team:resolve(s),label:(L.visibleSides&&L.visibleSides[no]&&no>=1&&no<=40?(i==0?'1塁側 ':'3塁側 '):'')+s.label}))}
function gameLot(no,title,cls,highlight=null){let src=sideOrderedSourcesForGame(no),visible=visibleSlotObj(),es=src.map((s,i)=>({team:s.slot?visible[s.slot]:null,label:(L.visibleSides&&L.visibleSides[no]?(i==0?'1塁側 ':'3塁側 '):'')+s.label,slot:s.slot}));let hi=(es[0]?.slot==highlight||es[1]?.slot==highlight)?' highlightSlot':'';return `<div class="game ${cls}${hi}"><div class="gl"><span>試合${no}</span><span>${esc(title)}</span></div>${row(no,es[0]||{},0,true)}${row(no,es[1]||{},1,true)}</div>`}
function renderAll(){let n=Object.keys(L.visibleSlots||{}).length,s=sameFirst();summary.innerHTML=`配置 ${n}/56 ${n===56?'<span class=ok>OK</span>':''}<br>同地区初戦：<b>${s.c}</b>件<br>${s.p.join('<br>')||'なし'}${L.hkTarget?'<br>北海道組込：'+esc(L.hkTarget):''}${L.splitRegions?.length?'<br>分割地区：'+esc(L.splitRegions.join('・')):''}`;renderLottery();renderBracket();renderFinals();renderList()}
function teamListPanel(){let rows=(L.teams||[]).slice().sort((a,b)=>a.pref.localeCompare(b.pref,'ja')).map(t=>`<tr><td>${esc(t.pref)}</td><td>${esc(t.name)}</td><td>${esc(t.origRegion)}</td></tr>`).join('');return `<div class="miniTable"><table><tr><th>代表</th><th>高校名</th><th>地区</th></tr>${rows}</table></div>`}
function preListPanel(){let rows=(L.teams||[]).slice().sort((a,b)=>a.pre-b.pre).map(t=>`<tr><td>${t.pre}</td><td>${esc(t.name)}</td><td>${esc(t.pref)}</td><td>${esc(t.origRegion)}</td></tr>`).join('');return `<div class="miniTable"><table><tr><th>予備</th><th>高校名</th><th>代表</th><th>地区</th></tr>${rows}</table></div>`}
function regionOrderPanel(){if(!L.order)return '';return `<div class="miniTable"><table><tr><th>順</th><th>地区</th><th>校数</th></tr>${L.order.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r)}</td><td>${(L.groups&&L.groups[r])?L.groups[r].length:''}</td></tr>`).join('')}</table></div>`}
function mainDrawOrderPanel(){let st=L.steps?.[L.stepIndex];if(st?.extra==='pre')return preListPanel();if(st?.extra==='teams')return teamListPanel();if(['order','alloc','side'].includes(st?.extra))return regionOrderPanel();return ''}
function resultCard(){let r=L.lastResult;if(!r)return '';if(r.kind==='place')return `<div class="cards"><div class="card nowCard"><b>${slotCode(r.slot)}</b><br>${esc(r.team.name)}<br><span class="small">${esc(r.team.pref)}／予備${r.team.pre}番／${esc(r.side)}箱</span></div></div>`;if(r.kind==='assign')return `<div class="cards"><div class="card nowCard"><b>${esc(r.region)}</b><br>${esc(r.side)}側へ ${r.size}校振分</div><div class="card"><b>振分前</b><br>A ${r.beforeA} / B ${r.beforeB}</div><div class="card"><b>振分後</b><br>A ${r.capA} / B ${r.capB}</div></div>`;if(r.kind==='side')return `<div class="cards"><div class="card nowCard"><b>試合${r.game}</b><br>1塁側：${esc(r.one)}<br>3塁側：${esc(r.three)}</div></div>`;return ''}
function walkSteps(){let steps=L.steps||[];return `<div class="walkSteps">${steps.map((s,i)=>`<div class="stepItem ${i<L.stepIndex?'done':i===L.stepIndex?'active':'todo'}">${i+1}. ${esc(s.title)}</div>`).join('')}</div>`}
function renderLottery(){let steps=L.steps||[],st=steps[L.stepIndex]||{},pct=steps.length?Math.round(L.stepIndex/(steps.length-1)*100):0,last=L.lastResult?.slot;lottery.innerHTML=`<div class="small">手順 ${L.stepIndex+1} / ${steps.length}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="bigStep">${esc(L.currentStep||'抽選フェーズ')}</div><div class="note">${esc(L.message||'')}</div>${mainDrawOrderPanel()}${resultCard()}<div class="walkNow"><h4>現在のトーナメント表</h4><div class="bracket"><div class="blocks">${blocks.map(b=>blockHTML(b,true,last)).join('')}</div></div></div>${walkSteps()}`}
// ===== end stable replay engine =====
renderNameEditor();resetLottery();

</script>
</main>
