const alias={"北埼玉":"埼玉","南埼玉":"埼玉","東千葉":"千葉","西千葉":"千葉","北神奈川":"神奈川","南神奈川":"神奈川","東愛知":"愛知","西愛知":"愛知","北大阪":"大阪","南大阪":"大阪","東兵庫":"兵庫","西兵庫":"兵庫","北福岡":"福岡","南福岡":"福岡"};
const LS_NAMES='k56_names_ok',LS_STATE='k56_state_ok';let current=null,state={games:{},qf:null,sf:null},stepIndex=0;
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function pick(a){return a[Math.floor(Math.random()*a.length)]}
function slotCode(n){n=Number(n);return n<=28?'A'+n:'B'+(n-28)}
function getNames(){try{return JSON.parse(localStorage.getItem(LS_NAMES)||'{}')}catch(e){return {}}}
function teamName(p){let n=getNames()[p];return n&&n.trim()?n.trim():p+'代表'}function randomSchoolNames(){let o={};base.forEach(([p])=>{let k=alias[p]||p,a=pool[p]||pool[k]||[p+'代表'];o[p]=pick(a)});localStorage.setItem(LS_NAMES,JSON.stringify(o));renderNameEditor();newDraw()}function saveNames(){let o={};document.querySelectorAll('[data-pref-input]').forEach(i=>{if(i.value.trim())o[i.dataset.prefInput]=i.value.trim()});localStorage.setItem(LS_NAMES,JSON.stringify(o))}function resetNames(){localStorage.removeItem(LS_NAMES);renderNameEditor()}function renderNameEditor(){let n=getNames(),h='<table><tr><th>代表</th><th>地区</th><th>高校名</th></tr>';base.forEach(([p,r])=>h+=`<tr><td>${esc(p)}</td><td>${esc(r)}</td><td><input data-pref-input="${esc(p)}" value="${esc(n[p]||p+'代表')}"></td></tr>`);nameEditor.innerHTML=h+'</table>'}
const blocks=[{no:1,slots:[1,2,3,4],r1:[],r2:[25,26],r3:41},{no:2,slots:[5,6,7,8],r1:[],r2:[27,28],r3:42},{no:3,slots:[9,10,11,12,13,14,15,16],r1:[1,2,3,4],r2:[29,30],r3:43},{no:4,slots:[17,18,19,20,21,22,23,24],r1:[5,6,7,8],r2:[31,32],r3:44},{no:5,slots:[25,26,27,28,29,30,31,32],r1:[9,10,11,12],r2:[33,34],r3:45},{no:6,slots:[33,34,35,36,37,38,39,40],r1:[13,14,15,16],r2:[35,36],r3:46},{no:7,slots:[41,42,43,44,45,46,47,48],r1:[17,18,19,20],r2:[37,38],r3:47},{no:8,slots:[49,50,51,52,53,54,55,56],r1:[21,22,23,24],r2:[39,40],r3:48}];
function initialPairs(){let ps=[];blocks.forEach(bl=>{let s=bl.slots;if(bl.no<=2){ps.push([s[0],s[1],bl.r2[0]],[s[2],s[3],bl.r2[1]])}else{for(let i=0;i<4;i++)ps.push([s[i*2],s[i*2+1],bl.r1[i]])}});return ps}
function makeDraw(){
 for(let at=0;at<5000;at++){
  let teams=sh(base.map(([pref,region])=>({pref,origRegion:region,region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1}));
  let groups={};
  teams.forEach(t=>(groups[t.region]??=[]).push(t));
  Object.values(groups).forEach(a=>a.sort((x,y)=>x.pre-y.pre));

  let hk=(groups.北海道||[]).slice();
  let targets=Object.keys(groups).filter(r=>r!='北海道'&&r!='関東東京'&&r!='九州');
  let hkTarget=pick(targets);
  groups[hkTarget]=[...(groups[hkTarget]||[]),...hk.map(t=>({...t,region:hkTarget,realRegion:'北海道'}))];
  delete groups.北海道;

  let rawOrder=sh(Object.keys(groups));
  let order=adjustOrder(rawOrder);

  let cap={A:28,B:28},preAssign=[],splitRegion=null,overSide=null,triggerRegion=null,bad=false;

  // 地区順どおりにA/Bくじを引く。
  // どちらかがマイナスになった時点でその側を締切。
  // その側に入っている地区のうち、地区順が一番若い地区を「分割地区」にする。
  for(let idx=0;idx<order.length;idx++){
   let r=order[idx],schools=(groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre),n=schools.length;
   let before={A:cap.A,B:cap.B};
   let side=cap.A>=cap.B?'A':'B';
   if(Math.random()<.5)side=side=='A'?'B':'A';

   cap[side]-=n;
   preAssign.push({region:r,side,n,before,after:{A:cap.A,B:cap.B},schools,trigger:false,forced:false});

   if(cap[side]<0){
    overSide=side;
    triggerRegion=r;
    splitRegion=preAssign.find(x=>x.side==overSide).region;
    preAssign[preAssign.length-1].trigger=true;

    // まだ引いていない地区は反対側へ自動決定
    for(let j=idx+1;j<order.length;j++){
     let rr=order[j],ss=(groups[rr]||[]).slice().sort((a,b)=>a.pre-b.pre),nn=ss.length;
     let fs=overSide=='A'?'B':'A';
     let bef={A:cap.A,B:cap.B};
     cap[fs]-=nn;
     preAssign.push({region:rr,side:fs,n:nn,before:bef,after:{A:cap.A,B:cap.B},schools:ss,trigger:false,forced:true});
    }
    break;
   }
  }

  for(let r of order){
   if(preAssign.some(x=>x.region==r))continue;
   let schools=(groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre),n=schools.length;
   let side=cap.A>=cap.B?'A':'B',before={A:cap.A,B:cap.B};
   cap[side]-=n;
   preAssign.push({region:r,side,n,before,after:{A:cap.A,B:cap.B},schools,trigger:false,forced:true});
  }

  let plan=[],alloc=preAssign.slice(),split=[];
  let splitInfo=null;

  if(splitRegion){
   split=[splitRegion];
   let splitAssign=preAssign.find(x=>x.region==splitRegion);
   let splitTeams=splitAssign.schools.slice().sort((a,b)=>a.pre-b.pre);

   let countsWithout={A:0,B:0};
   preAssign.forEach(x=>{if(x.region!=splitRegion)countsWithout[x.side]+=x.n});

   let aNeed=28-countsWithout.A;
   let bNeed=28-countsWithout.B;
   if(aNeed<0||bNeed<0||aNeed+bNeed!=splitTeams.length){bad=true}
   if(bad)continue;

   let tickets=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
   let splitRows=[];
   splitTeams.forEach((t,i)=>{
    splitRows.push({...t,drawSide:tickets[i],note:splitRegion+' 分割',split:true,cTicket:tickets[i]});
   });

   splitInfo={region:splitRegion,triggerRegion,overSide,aNeed,bNeed,splitRows};

   preAssign.forEach(x=>{
    if(x.region==splitRegion)return;
    x.schools.forEach(t=>plan.push({...t,drawSide:x.side,note:x.region,split:false}));
   });
   plan.push(...splitRows);
  }else{
   preAssign.forEach(x=>{
    x.schools.forEach(t=>plan.push({...t,drawSide:x.side,note:x.region,split:false}));
   });
  }

  let pools={A:[...Array(28)].map((_,i)=>i+1),B:[...Array(28)].map((_,i)=>i+29)},slots={},placements=[];
  let splitSet=new Set(split);
  let splitDraws=plan.filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  let restDraws=plan.filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);

  // 分割地区はC箱で先に本抽選。
  // C番号を引き、A/Bくじ結果に応じてA番号/B番号へ写像し、その番号をA/B箱から抜く。
  let usedC=new Set();
  for(let t of splitDraws){
   let nums=sh([...Array(28)].map((_,i)=>i+1)).filter(n=>!usedC.has(n));
   let chosen=null;
   for(let c of nums){
    let s=t.drawSide=='A'?c:c+28;
    let p=initialPairs().find(([a,b])=>a==s||b==s);
    let ok=true;
    if(p){
     let o=p[0]==s?p[1]:p[0];
     ok=!slots[o]||slots[o].origRegion!=t.origRegion;
    }
    if(ok){chosen={c,slot:s};break}
   }
   if(!chosen){bad=true;break}
   usedC.add(chosen.c);
   let pool=pools[t.drawSide],idx=pool.indexOf(chosen.slot);
   if(idx>=0)pool.splice(idx,1);
   slots[chosen.slot]={...t,slot:chosen.slot,cNo:chosen.c};
   placements.push({...t,slot:chosen.slot,cNo:chosen.c,phase:'split'});
  }
  if(bad)continue;

  for(let t of restDraws){
   let valid=pools[t.drawSide].filter(s=>{
    let p=initialPairs().find(([a,b])=>a==s||b==s);
    if(!p)return true;
    let o=p[0]==s?p[1]:p[0];
    return !slots[o]||slots[o].origRegion!=t.origRegion;
   });
   if(!valid.length){bad=true;break}
   let s=pick(valid);
   slots[s]={...t,slot:s};
   pools[t.drawSide].splice(pools[t.drawSide].indexOf(s),1);
   placements.push({...t,slot:s,phase:'main'});
  }
  if(bad)continue;

  let c=0;
  initialPairs().forEach(([a,b])=>{if(slots[a].origRegion==slots[b].origRegion)c++});
  if(Object.keys(slots).length==56&&c==0){
   return{teams,groups,hkTarget,rawOrder,order,alloc,split,splitInfo,slots,placements,sideDraw:{}};
  }
 }
 throw Error('draw failed');
}
function adjustOrder(raw){
 let big=['関東東京','九州'];
 let first4=raw.slice(0,4);
 let missing=big.filter(r=>!first4.includes(r)).sort((a,b)=>raw.indexOf(a)-raw.indexOf(b));
 if(!missing.length)return raw.slice();

 // 既存順をなるべく維持しながら、不足している大地区だけを4番目以内へ繰り上げる
 let work=raw.filter(r=>!missing.includes(r));
 let head=work.slice(0,4);
 let displaced=[];
 let keepCount=4-missing.length;

 while(head.length>keepCount){
   let idx=-1;
   for(let i=head.length-1;i>=0;i--){
     if(!big.includes(head[i])){idx=i;break}
   }
   if(idx<0)idx=head.length-1;
   displaced.unshift(head.splice(idx,1)[0]);
 }
 return [...head,...missing,...displaced,...work.slice(4)];
}

     });
   });
 }else{
   steps.push({title:'分割地区の発生判定',body:'分割地区：なし。',kind:'order'});
 }

 let splitPlacements=d.placements.filter(p=>p.phase==='split');
 let normalPlacements=d.placements.filter(p=>p.phase!=='split');

 splitPlacements.forEach((p,i)=>{
   steps.push({
    title:`分割地区C箱本抽選 ${i+1}：予備抽選${p.pre}番`,
    body:`${p.name}（${p.pref}） → C${p.cNo} → ${slotCode(p.slot)}`,
    kind:'place',

   });
 });

 normalPlacements.forEach((p,i)=>{
   steps.push({

    body:`${p.name}（${p.pref}） → ${slotCode(p.slot)}`,
    kind:'place',
    place:p
   });
 });

 steps.push({title:'A/B本抽選完了・1塁側/3塁側抽選へ',body:'56枠の本抽選が完了しました。続いて初戦カードごとに1塁側・3塁側を抽選します。',kind:'sideStart'});
 initialPairs().map(p=>p[2]).sort((a,b)=>a-b).forEach(no=>steps.push({title:`1塁側/3塁側抽選：試合${no}`,body:`試合${no}の1塁側・3塁側を抽選します。`,kind:'side',gameNo:no}));
 steps.push({title:'抽選完了',body:'配置と1塁側・3塁側抽選が完了しました。',kind:'done'});
 return steps
}

function srcLabel(s){return s.slot?slotCode(s.slot):'試合'+s.game+'勝者'}function sourceForGame(no){for(let bl of blocks){let s=bl.slots;if(bl.no<=2){if(bl.r2[0]==no)return[{slot:s[0]},{slot:s[1]}];if(bl.r2[1]==no)return[{slot:s[2]},{slot:s[3]}]}else{for(let i=0;i<4;i++)if(bl.r1[i]==no)return[{slot:s[i*2]},{slot:s[i*2+1]}];if(bl.r2[0]==no)return[{game:bl.r1[0]},{game:bl.r1[1]}];if(bl.r2[1]==no)return[{game:bl.r1[2]},{game:bl.r1[3]}]}if(bl.r3==no)return[{game:bl.r2[0]},{game:bl.r2[1]}]}if(no>=49&&no<=52){let q=state.qf?.[no];return q?q.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'再抽選待ち'},{raw:true,label:'再抽選待ち'}]}if(no==53||no==54){let s=state.sf?.[no];return s?s.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'準決勝再抽選待ち'},{raw:true,label:'準決勝再抽選待ち'}]}if(no==55)return[{game:53},{game:54}];return[]}

function qEntry(no){let t=gstate(no).winner;return{label:'試合'+no+'勝者',team:clone(t),src:no}}function blank(l){return{label:l,team:null,src:null}}function ensureQF(){if(!state.qf)state.qf={49:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],50:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],51:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')],52:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')]}}function assignEntry(map,no,pos){let ent=qEntry(no);if(!ent.team)return false;for(let p of pos){let e=map[p.m]?.[p.i];if(e&&e.src==no){map[p.m][p.i]=ent;return false}}let em=pos.filter(p=>!map[p.m]?.[p.i]?.src);if(!em.length)return false;let p=pick(em);map[p.m][p.i]=ent;return true}function assignQFForGame(no){ensureQF();let ch=false;if(no>=41&&no<=44)ch=assignEntry(state.qf,no,[{m:49,i:0},{m:49,i:1},{m:50,i:0},{m:50,i:1}]);if(no>=45&&no<=48)ch=assignEntry(state.qf,no,[{m:51,i:0},{m:51,i:1},{m:52,i:0},{m:52,i:1}]);if(ch){state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}return ch}function drawQF(){for(let n=41;n<=48;n++)assignQFForGame(n);renderAll();showTab('finals')}function clearQF(){state.qf=null;state.sf=null;renderAll()}function ensureSF(){if(!state.sf)state.sf={53:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')],54:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')]}}function assignSFForGame(no){ensureSF();return assignEntry(state.sf,no,[{m:53,i:0},{m:53,i:1},{m:54,i:0},{m:54,i:1}])}function drawSF(){for(let n=49;n<=52;n++)assignSFForGame(n);renderAll();showTab('finals')}function clearSF(){state.sf=null;renderAll()}
