function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function makeTeams(){
  return sh(base.map(([pref,region])=>({pref,region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1,drawSide:null}));
}
function groupTeams(teams){
  let g={}; teams.forEach(t=>(g[t.region]??=[]).push(t));
  Object.values(g).forEach(a=>a.sort((x,y)=>x.pre-y.pre));
  return g;
}
function rawRegionOrder(groups){
  // 北海道は先にどこかへ組み込むため、地区順抽選からは除外
  return sh(Object.keys(groups).filter(r=>r!=='北海道'));
}
function adjustRegionOrder(raw){
  // 既存順をなるべく維持し、関東東京・九州が4番目以内に入るよう最小限だけ繰り上げる
  let arr=[...raw];
  ['関東東京','九州'].forEach(key=>{
    let i=arr.indexOf(key);
    if(i<0)return;
    if(i>3){
      arr.splice(i,1);
      // 4番目以内の後ろ側へ差し込む。先行地区をなるべく残す
      arr.splice(3,0,key);
    }
  });
  return arr;
}
function sideCap56(){return {A:28,B:28}}
function otherSide(s){return s==='A'?'B':'A'}
function allocateSides56(groups,order){
  let cap=sideCap56(), plan=[], flow=[], splitRegions=[];
  function add(t,side,note){plan.push({...t,drawSide:side,note});cap[side]--}
  for(const r of order){
    let schools=(groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre);
    if(!schools.length)continue;
    let n=schools.length;
    let preferred = cap.A>=cap.B?'A':'B';
    if(Math.random()<0.5)preferred=otherSide(preferred);
    let side=preferred, other=otherSide(side);
    if(cap[side] >= n){
      schools.forEach(t=>add(t,side,r));
      flow.push(`${r} → ${side}側 ${n}校`);
    }else if(cap[other] >= n){
      schools.forEach(t=>add(t,other,r));
      flow.push(`${r} → ${other}側 ${n}校`);
    }else{
      // 分割地区。残り枠に合わせてA/B枚数を決める
      splitRegions.push(r);
      let aNeed=Math.max(0,Math.min(n,cap.A));
      let bNeed=n-aNeed;
      let tickets=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
      schools.forEach((t,i)=>add(t,tickets[i],r+' 分割'));
      flow.push(`${r} → 分割 A${aNeed}校 / B${bNeed}校`);
    }
  }
  return {plan,flow,splitRegions,cap};
}
function makeSlotPools(){
  // 1〜28をA側、29〜56をB側として扱う。表示上は枠番号のみ。
  return {A:[...Array(28)].map((_,i)=>i+1), B:[...Array(28)].map((_,i)=>i+29)};
}
function tryPlaceOne(slots,t,pool){
  let candidates=[...pool];
  // 初戦ペアの相手が同地区になる候補を除外
  let ok=candidates.filter(s=>{
    let pair=initialPairs().find(([a,b])=>a===s||b===s);
    if(!pair)return true;
    let other=pair[0]===s?pair[1]:pair[0];
    return !slots[other] || slots[other].region!==t.region;
  });
  if(ok.length)candidates=ok;
  if(!candidates.length)return false;
  let pick=candidates[Math.floor(Math.random()*candidates.length)];
  slots[pick]={...t,slot:pick};
  pool.splice(pool.indexOf(pick),1);
  return true;
}
function placeByPlan56(plan,splitRegions){
  let slots={}, pools=makeSlotPools();
  // 分割地区を先に、各地区の予備抽選番号の若い順で本抽選
  let splitSet=new Set(splitRegions);
  let first=plan.filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  let rest=plan.filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  for(const t of [...first,...rest]){
    if(!tryPlaceOne(slots,t,pools[t.drawSide]))return null;
  }
  return slots;
}
function sim(){
  for(let k=0;k<6000;k++){
    let teams=makeTeams();
    let groups=groupTeams(teams);

    // 北海道2代表を、関東東京・九州以外の地区へ2校1組で仮編入
    let hk=(groups['北海道']||[]).slice().sort((a,b)=>a.pre-b.pre);
    let targets=Object.keys(groups).filter(r=>r!=='北海道'&&r!=='関東東京'&&r!=='九州');
    let hkTarget=targets[Math.floor(Math.random()*targets.length)];
    groups[hkTarget]=[...(groups[hkTarget]||[]),...hk.map(t=>({...t,region:hkTarget,realRegion:'北海道',note:'北海道組込'}))];
    delete groups['北海道'];

    let rawOrder=rawRegionOrder(groups);
    let order=adjustRegionOrder(rawOrder);
    let alloc=allocateSides56(groups,order);
    if(alloc.cap.A!==0||alloc.cap.B!==0)continue;

    let slots=placeByPlan56(alloc.plan,alloc.splitRegions);
    if(!slots)continue;

    let d={slots,teams:Object.values(slots).sort((a,b)=>a.pre-b.pre),rawOrder,order,hkTarget,allocFlow:alloc.flow,splitRegions:alloc.splitRegions};
    if(Object.keys(slots).length===56 && sameFirst(d).c===0)return d;
  }
  // fail-safe fallback: keep trying until a full random valid placement appears
  for(let k=0;k<6000;k++){
    let teams=makeTeams(), slots={};
    sh(teams).forEach((t,i)=>slots[i+1]={...t,slot:i+1});
    let d={slots,teams:Object.values(slots).sort((a,b)=>a.pre-b.pre),rawOrder:[],order:[],hkTarget:'',allocFlow:[],splitRegions:[]};
    if(sameFirst(d).c===0)return d;
  }
  let teams=makeTeams(),slots={};teams.forEach((t,i)=>slots[i+1]={...t,slot:i+1});
  return{slots,teams,rawOrder:[],order:[],hkTarget:'',allocFlow:[],splitRegions:[]};
}
function sourceForGame(no){
 for(const bl of blocks){let s=bl.slots;
  if(bl.no<=2){
   if(bl.r2[0]===no)return[{slot:s[0],label:`枠${s[0]}`},{slot:s[1],label:`枠${s[1]}`}];
   if(bl.r2[1]===no)return[{slot:s[2],label:`枠${s[2]}`},{slot:s[3],label:`枠${s[3]}`}];
  }else{
   for(let i=0;i<4;i++)if(bl.r1[i]===no)return[{slot:s[i*2],label:`枠${s[i*2]}`},{slot:s[i*2+1],label:`枠${s[i*2+1]}`}];
   if(bl.r2[0]===no)return[{game:bl.r1[0],label:`試合${bl.r1[0]}勝者`},{game:bl.r1[1],label:`試合${bl.r1[1]}勝者`}];
   if(bl.r2[1]===no)return[{game:bl.r1[2],label:`試合${bl.r1[2]}勝者`},{game:bl.r1[3],label:`試合${bl.r1[3]}勝者`}];
  }
  if(bl.r3===no)return[{game:bl.r2[0],label:`試合${bl.r2[0]}勝者`},{game:bl.r2[1],label:`試合${bl.r2[1]}勝者`}];
 }
 if(no>=49&&no<=52){let q=state.qf?.[no];if(q)return q.map(e=>({team:e.team,label:e.label,raw:true}));return[{label:'再抽選待ち',raw:true},{label:'再抽選待ち',raw:true}]}
 if(no===53||no===54){let s=state.sf?.[no];if(s)return s.map(e=>({team:e.team,label:e.label,raw:true}));return[{label:'準決勝再抽選待ち',raw:true},{label:'準決勝再抽選待ち',raw:true}]}
 if(no===55)return[{game:53,label:'試合53勝者'},{game:54,label:'試合54勝者'}];
 return[];
}
function resolve(src){if(src.raw)return src.team||null;if(src.slot)return current.slots[src.slot];let g=state.games[src.game];return g?.winner||null}
function entrants(no){return sourceForGame(no).map(s=>({team:resolve(s),label:s.label}))}
function gstate(no){state.games[no]??={};return state.games[no]}
function setWinner(no,idx){let e=entrants(no)[idx];if(!e||!e.team){alert('勝者未確定です');return}state.games[no]??={};state.games[no].winner={...e.team};state.games[no].winnerIndex=idx;if(no>=41&&no<=48)assignQFForGame(no);if(no>=49&&no<=52)assignSFForGame(no);saveInputs();renderAll()}
function saveInputs(){document.querySelectorAll('[data-date]').forEach(i=>gstate(+i.dataset.date).date=i.value);document.querySelectorAll('[data-score]').forEach(i=>gstate(+i.dataset.score)['score'+i.dataset.idx]=i.value);document.querySelectorAll('[data-note]').forEach(i=>gstate(+i.dataset.note).note=i.value);localStorage.setItem(LS_STATE,JSON.stringify(state))}
function saveState(){saveInputs();alert('保存しました')}function loadState(){try{state=JSON.parse(localStorage.getItem(LS_STATE)||'{"games":{},"qf":null,"sf":null}');state.games??={};state.qf??=null;state.sf??=null}catch(e){state={games:{},qf:null,sf:null}}}function clearState(){if(confirm('進行を初期化しますか？')){state={games:{},qf:null,sf:null};localStorage.removeItem(LS_STATE);renderAll()}}
function row(no,e,idx){let t=e.team,gs=gstate(no),picked=gs.winnerIndex==idx;return `<div class="team ${idx==0?'side1':'side3'} ${picked?'winrow':''}"><span class="src">${esc(e.label||'')}</span><span>${t?`<span class="tn">${esc(t.name)}</span> <span class="pref">(${esc(t.pref)})</span>`:`<span class="pending">未定</span>`}</span><button class="pick ${picked?'picked':''}" onclick="setWinner(${no},${idx})">勝</button></div>`}
function game(no,title,cls){let gs=gstate(no),es=entrants(no);return `<div class="game ${cls}"><div class="gl"><span>試合${no}</span><span>${title}</span></div><div class="meta"><input class="date" data-date="${no}" placeholder="8/6 10:00" value="${esc(gs.date||'')}" onchange="saveInputs()"><span>スコア</span><input class="score" data-score="${no}" data-idx="0" value="${esc(gs.score0||'')}" onchange="saveInputs()"> - <input class="score" data-score="${no}" data-idx="1" value="${esc(gs.score1||'')}" onchange="saveInputs()"><input class="noteInput" data-note="${no}" placeholder="延長12回TB等" value="${esc(gs.note||'')}" onchange="saveInputs()"></div>${row(no,es[0]||{},0)}${row(no,es[1]||{},1)}</div>`}
function gameLot(no,title,cls,reveal){let src=sourceForGame(no),es=src.map(s=>({team:s.slot&&reveal.has(s.slot)?current.slots[s.slot]:null,label:s.label}));function r(e,idx){return `<div class="team ${idx==0?'side1':'side3'}"><span class="src">${esc(e.label||'')}</span><span>${e.team?`<span class="tn">${esc(e.team.name)}</span> <span class="pref">(${esc(e.team.pref)})</span>`:`<span class="pending">抽選待ち</span>`}</span><span></span></div>`}return `<div class="game ${cls}"><div class="gl"><span>試合${no}</span><span>${title}</span></div>${r(es[0]||{},0)}${r(es[1]||{},1)}</div>`}
function blockHTML(bl,lot=false,reveal=new Set()){let gf=lot?((n,t,c)=>gameLot(n,t,c,reveal)):game;let left='',mid='';if(bl.no<=2){mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}else{left=bl.r1.map(n=>gf(n,'1回戦','r1')).join('');mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}return `<div class="block"><div class="bt"><span>第${bl.no}ブロック</span><span>${bl.no<=2?'2回戦スタート':'1回戦スタート'}</span></div><div class="tree"><div class="col">${left}</div><div class="col">${mid}</div><div class="col">${gf(bl.r3,'3回戦','r3')}</div></div></div>`}
function qEntry(no){let t=gstate(no).winner;return {label:'試合'+no+'勝者',team:t?{...t}:null,src:no}}
function blank(label){return{label,team:null,src:null}}
function ensureQF(){if(!state.qf){state.qf={49:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],50:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],51:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')],52:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')]}}}
function assignEntry(map,no,positions){let ent=qEntry(no);if(!ent.team)return false;for(let p of positions){let e=map[p.m]?.[p.i];if(e&&e.src===no){map[p.m][p.i]=ent;return false}}let empty=positions.filter(p=>!map[p.m]?.[p.i]?.src);if(!empty.length)return false;let p=sh(empty)[0];map[p.m][p.i]=ent;return true}
function assignQFForGame(no){ensureQF();let changed=false;if(no>=41&&no<=44)changed=assignEntry(state.qf,no,[{m:49,i:0},{m:49,i:1},{m:50,i:0},{m:50,i:1}]);if(no>=45&&no<=48)changed=assignEntry(state.qf,no,[{m:51,i:0},{m:51,i:1},{m:52,i:0},{m:52,i:1}]);if(changed){state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}return changed}
function drawQF(){saveInputs();let any=false;for(let n=41;n<=48;n++)if(assignQFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の3回戦勝者はありません。')}
function clearQF(){if(!confirm('準々決勝以降を解除しますか？'))return;state.qf=null;state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}
function ensureSF(){if(!state.sf){state.sf={53:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')],54:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')]}}}
function assignSFForGame(no){ensureSF();let changed=false;if(no>=49&&no<=52)changed=assignEntry(state.sf,no,[{m:53,i:0},{m:53,i:1},{m:54,i:0},{m:54,i:1}]);if(changed){[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}return changed}
function drawSF(){saveInputs();let any=false;for(let n=49;n<=52;n++)if(assignSFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の準々決勝勝者はありません。')}
function clearSF(){if(!confirm('準決勝以降を解除しますか？'))return;state.sf=null;[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}
function renderBracket(){bracket.innerHTML='<div class="note"><span class="pill" style="background:var(--r1)">1回戦1〜24</span><span class="pill" style="background:var(--r2)">2回戦25〜40</span><span class="pill" style="background:var(--r3)">3回戦41〜48</span></div><div class="blocks">'+blocks.map(b=>blockHTML(b)).join('')+'</div>'}
function renderFinals(){let h='<div class="note"><span class="pill" style="background:var(--qf)">準々決勝49〜52</span><span class="pill" style="background:var(--sf)">準決勝53〜54</span><span class="pill" style="background:var(--final)">決勝55</span></div><div class="finalGrid">';for(let n=49;n<=52;n++)h+=game(n,'準々決勝','qf');h+=game(53,'準決勝','sf')+game(54,'準決勝','sf')+game(55,'決勝','final')+'</div>';finals.innerHTML=h}
function renderList(){let h='<table><tr><th>枠</th><th>校名</th><th>代表</th><th>地区</th><th>予備抽選</th></tr>';Object.values(current.slots).sort((a,b)=>a.slot-b.slot).forEach(t=>h+=`<tr><td>${t.slot}</td><td>${esc(t.name)}</td><td>${esc(t.pref)}</td><td>${esc(t.region)}</td><td>${t.pre}</td></tr>`);list.innerHTML=h+'</table>'}

function buildSteps(){
  let st=[];
  st.push({title:'56代表がそろう',body:'記念大会の56代表を用意します。トーナメント表はまだ空です。',reveal:[]});

  let pre='<div class="lotterySlots">'+[...current.teams].sort((a,b)=>a.pre-b.pre).map(t=>`<div class="lotterySlot"><b>${t.pre}</b> ${esc(t.name)}<br><span class="small">${esc(t.pref)}／${esc(t.realRegion||t.region)}</span></div>`).join('')+'</div>';
  st.push({title:'予備抽選番号の付与',body:pre,html:true,reveal:[]});

  st.push({title:'北海道2代表の組み込み',body:`北北海道・南北海道を2校1組として、関東東京・九州以外の地区へ仮編入します。今回の組み込み先：${current.hkTarget||'未記録'}`,reveal:[]});

  st.push({title:'地区順抽選',body:`素の地区順：${(current.rawOrder||[]).join(' → ')||'未記録'}`,reveal:[]});
  st.push({title:'関東東京・九州の順番調整',body:`整合性確保のため、既存順をなるべく維持しつつ関東東京・九州を4番目以内へ調整します。確定順：${(current.order||[]).join(' → ')||'未記録'}`,reveal:[]});

  (current.allocFlow||[]).forEach((txt,i)=>st.push({title:`A/B振分 ${i+1}`,body:txt,reveal:[]}));

  st.push({title:'分割地区の確認',body:`分割地区：${(current.splitRegions||[]).join('・')||'なし'}。分割地区がある場合は、その地区の高校を予備抽選番号の若い順に先に本抽選します。`,reveal:[]});

  let splitSet=new Set(current.splitRegions||[]);
  let splitTeams=Object.values(current.slots).filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
  let restTeams=Object.values(current.slots).filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);

  splitTeams.forEach(t=>st.push({title:`分割地区本抽選 ${t.pre}番 ${t.pref}`,body:`${t.name} が枠${t.slot}へ入ります。`,reveal:[t.slot]}));
  restTeams.forEach(t=>st.push({title:`本抽選 ${t.pre}番 ${t.pref}`,body:`${t.name} が枠${t.slot}へ入ります。`,reveal:[t.slot]}));

  st.push({title:'3回戦までの事前抽選完了',body:'56代表の配置が完了しました。初戦同地区対決がないことを確認済みです。',reveal:Object.keys(current.slots).map(Number)});
  return st;
}
function revealSet(){let s=new Set();for(let i=0;i<=step&&i<steps.length;i++)(steps[i].reveal||[]).forEach(x=>s.add(x));return s}
function renderLottery(){let cur=steps[step]||steps[0],pct=steps.length?((step+1)/steps.length*100):0,reveal=revealSet();lottery.innerHTML=`<div class="small">手順 ${step+1}/${steps.length}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="bigStep">${esc(cur.title)}</div><div class="note">${cur.html?cur.body:esc(cur.body)}</div><div class="blocks" style="margin-top:10px">${blocks.map(b=>blockHTML(b,true,reveal)).join('')}</div>`}
function renderAll(){let s=sameFirst(current),vals=Object.values(current.slots);summary.innerHTML=`配置 ${vals.length}/56 <span class=ok>OK</span><br>同地区初戦：<b>${s.c}</b>件<br>${s.p.join('<br>')||'なし'}<br>北海道組込：${esc(current.hkTarget||'')}<br>分割地区：${esc((current.splitRegions||[]).join('・')||'なし')}`;renderBracket();renderFinals();renderList();steps=buildSteps();if(step>=steps.length)step=steps.length-1;renderLottery()}
function newDraw(){current=sim();state={games:{},qf:null,sf:null};step=0;renderAll();saveInputs()}
function stats(){let bad=0,max=0;for(let i=0;i<1000;i++){let c=sameFirst(sim()).c;if(c)bad++;if(c>max)max=c}alert(`1000回検証\n同地区初戦発生：${bad}/1000\n最大：${max}`)}
function showTab(n){['lottery','bracket','finals','names','list'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('hide',x!==n));if(n==='names')renderNameEditor()}
function nextStep(){step=Math.min(step+1,steps.length-1);renderLottery()}function prevStep(){step=Math.max(step-1,0);renderLottery()}function firstStep(){step=0;renderLottery()}function lastStep(){step=steps.length-1;renderLottery()}
renderNameEditor();loadState();current=sim();renderAll();
