<style>

*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink)}

main{max-width:1500px;margin:auto;padding:10px}
section{background:var(--card);border-radius:12px;padding:12px;margin:10px 0;box-shadow:0 1px 3px #0001}

button.secondary{background:#475569}.light{background:#e5e7eb;color:#111827}.danger{background:#b91c1c}.green{background:#047857}
button:disabled{opacity:.45;cursor:not-allowed}
.small{font-size:12px;color:var(--muted)}.ok{color:#047857;font-weight:700}.warn{color:#b91c1c;font-weight:700}
.ctrl{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.tabs button{margin:2px}.hide{display:none}
.grid{display:grid;grid-template-columns:320px 1fr;gap:12px}.sticky{position:sticky;top:10px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.sticky{position:static}}
.note{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;line-height:1.55;color:#334155}

.bar{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:6px 0}.bar>span{display:block;height:100%;background:#111827}
.bigStep{font-size:18px;font-weight:800;margin:8px 0}
.stepPanel{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
.stepList{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px;margin:8px 0}
.stepItem{padding:7px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:8px;font-size:12px}
.stepItem.active{border-left-color:#111827;background:#eef2ff}.stepItem.done{border-left-color:#047857;background:#ecfdf5}
.bracket{overflow:auto}.blocks{display:grid;grid-template-columns:1fr;gap:12px}
.block{border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden}
.bt{background:#111827;color:white;padding:8px 10px;font-weight:800;display:flex;justify-content:space-between;gap:6px}
.tree{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;align-items:center}
.col{display:flex;flex-direction:column;gap:8px}.game{border:1px solid var(--line);border-radius:9px;background:#fff;overflow:hidden}

input{border:1px solid var(--line);border-radius:6px;padding:5px;font-size:12px}.date{width:115px}.score{width:44px;text-align:center}.noteInput{width:120px}

.team:last-child{border-bottom:0}.side1{border-left:5px solid var(--a)}.side3{border-left:5px solid var(--b)}.winrow{background:var(--win)}
.tn{font-weight:800}.pref{font-size:10px;color:var(--muted)}.src{font-size:11px;color:var(--muted)}.pending{color:#94a3b8;font-weight:700}

 main{padding:6px}section{padding:9px}.tree{grid-template-columns:1fr}.team{grid-template-columns:42px 1fr auto}.date{width:100%}.noteInput{width:100%}

<body>
<header>
<h2>高校野球 記念大会56代表 抽選・大会進行表</h2>
<div class="small">北海道組込／地区順調整／A・B振分／分割地区先抽選／初戦同地区なし／準々決勝以降再抽選</div>
</header>
<main>
<div class="grid">
<div>
<section class="sticky">
<div class="ctrl">
<button onclick="newDraw()">新しい抽選</button>
<button class="secondary" onclick="stats()">1000回検証</button>
<button class="light" onclick="saveState()">進行保存</button>
<button class="light" onclick="loadState();renderAll()">進行読込</button>
<button class="danger" onclick="clearState()">進行初期化</button>
</div>
<div id="summary" style="margin-top:8px"></div>
</section>
<section>
<h3>表示</h3>
<div class="tabs">
<button onclick="showTab('lottery')">抽選フェーズ</button>
<button class="secondary" onclick="showTab('bracket')">3回戦まで</button>
<button class="secondary" onclick="showTab('finals')">準々決勝以降</button>
<button class="secondary" onclick="showTab('names')">高校名変更</button>
<button class="secondary" onclick="showTab('list')">配置一覧</button>
</div>
<p class="small">抽選フェーズは、通常大会版のように「次へ」で1手ずつ進み、トーナメント表が徐々に埋まります。</p>
</section>
</div>
<div>
<section id="tab-lottery">
<h3>抽選フェーズ</h3>
<div class="note">記念大会56代表版。第1・第2ブロックは2回戦スタート、第3〜第8ブロックは1回戦スタートです。</div>
<div class="ctrl">
<button onclick="nextStep()">次へ</button>
<button class="light" onclick="prevStep()">戻る</button>
<button class="light" onclick="firstStep()">最初へ</button>
<button class="light" onclick="lastStep()">最後まで</button>
</div>
<div id="lottery" class="stepPanel"></div>
</section>

<section id="tab-bracket" class="hide">
<h3>3回戦まで</h3>
<div id="bracket"></div>
</section>

<section id="tab-finals" class="hide">
<h3>準々決勝以降</h3>
<div class="ctrl">
<button onclick="drawQF()">準々決勝の未抽選分を確定</button>
<button class="light" onclick="clearQF()">準々決勝解除</button>
<button onclick="drawSF()">準決勝の未抽選分を確定</button>
<button class="light" onclick="clearSF()">準決勝解除</button>
</div>
<div id="finals"></div>
</section>

<section id="tab-names" class="hide">
<h3>高校名変更</h3>
<div class="ctrl">
<button onclick="randomSchoolNames()">仮校名をランダム投入</button>
<button onclick="saveNames();newDraw()">保存して再抽選</button>
<button class="light" onclick="resetNames();newDraw()">校名初期化</button>
</div>
<div id="nameEditor"></div>
</section>

<section id="tab-list" class="hide">
<h3>配置一覧</h3>
<div id="list"></div>
</section>
</div>
</div>

const alias={"北埼玉":"埼玉","南埼玉":"埼玉","東千葉":"千葉","西千葉":"千葉","北神奈川":"神奈川","南神奈川":"神奈川","東愛知":"愛知","西愛知":"愛知","北大阪":"大阪","南大阪":"大阪","東兵庫":"兵庫","西兵庫":"兵庫","北福岡":"福岡","南福岡":"福岡"};

const LS_STATE='kokoyakyu_memorial56_state_v3';
let current=null,state={games:{},qf:null,sf:null},step=0,steps=[];

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getNames(){try{return JSON.parse(localStorage.getItem(LS_NAMES)||'{}')}catch(e){return {}}}
function teamName(pref){let n=getNames()[pref];return n&&n.trim()?n.trim():pref+'代表'}

const blocks=[

{no:5,slots:[25,26,27,28,29,30,31,32],r1:[9,10,11,12],r2:[33,34],r3:45,qf:[51,52],start:'1回戦スタート'},

{no:7,slots:[41,42,43,44,45,46,47,48],r1:[17,18,19,20],r2:[37,38],r3:47,qf:[51,52],start:'1回戦スタート'},
{no:8,slots:[49,50,51,52,53,54,55,56],r1:[21,22,23,24],r2:[39,40],r3:48,qf:[51,52],start:'1回戦スタート'}

function allSlotsForSide(side){return side==='A'?[...Array(28)].map((_,i)=>i+1):[...Array(28)].map((_,i)=>i+29)}
function initialPairs(){
 let ps=[];
 blocks.forEach(bl=>{
  let s=bl.slots;
  if(bl.no<=2){ps.push([s[0],s[1],bl.r2[0]],[s[2],s[3],bl.r2[1]])}
  else{for(let i=0;i<4;i++)ps.push([s[i*2],s[i*2+1],bl.r1[i]])}
 });
 return ps;
}
function makeTeams(){return sh(base.map(([pref,region])=>({pref,region,origRegion:region,name:teamName(pref)}))).map((t,i)=>({...t,pre:i+1,drawSide:null,slot:null,note:''}))}
function groupTeams(teams){let g={};teams.forEach(t=>(g[t.region]??=[]).push(t));Object.values(g).forEach(a=>a.sort((x,y)=>x.pre-y.pre));return g}
function adjustOrderMinimal(raw){
 let arr=[...raw];
 ['関東東京','九州'].forEach(key=>{
  let i=arr.indexOf(key);
  if(i>3){arr.splice(i,1);arr.splice(3,0,key)}
 });
 return arr;
}
function allocate(groups,order){
 let cap={A:28,B:28},plan=[],flow=[],split=[];
 function add(t,side,note){plan.push({...t,drawSide:side,note});cap[side]--}
 for(const r of order){
  let schools=(groups[r]||[]).slice().sort((a,b)=>a.pre-b.pre),n=schools.length;
  if(!n)continue;
  let side=cap.A>=cap.B?'A':'B'; if(Math.random()<.5)side=side==='A'?'B':'A';
  let other=side==='A'?'B':'A';
  if(cap[side]>=n){schools.forEach(t=>add(t,side,r));flow.push({region:r,text:`${r} → ${side}側 ${n}校`,side})}
  else if(cap[other]>=n){schools.forEach(t=>add(t,other,r));flow.push({region:r,text:`${r} → ${other}側 ${n}校`,side:other})}
  else{
   split.push(r);
   let aNeed=Math.max(0,Math.min(n,cap.A));
   let bNeed=n-aNeed;
   let tickets=sh([...Array(aNeed).fill('A'),...Array(bNeed).fill('B')]);
   schools.forEach((t,i)=>add(t,tickets[i],r+' 分割'));
   flow.push({region:r,text:`${r} → 分割 A${aNeed}校 / B${bNeed}校`,side:'分割'});
  }
 }
 return {plan,flow,split,cap};
}
function tryPlace(slots,t,pool){
 let candidates=[...pool];
 let ok=candidates.filter(s=>{
  let p=initialPairs().find(([a,b])=>a===s||b===s);
  if(!p)return true;
  let other=p[0]===s?p[1]:p[0];
  return !slots[other] || slots[other].origRegion!==t.origRegion;
 });
 if(ok.length)candidates=ok;
 if(!candidates.length)return false;
 let pick=candidates[Math.floor(Math.random()*candidates.length)];
 slots[pick]={...t,slot:pick};
 pool.splice(pool.indexOf(pick),1);
 return true;
}
function placePlan(plan,split){
 let slots={},pools={A:allSlotsForSide('A'),B:allSlotsForSide('B')};
 let splitSet=new Set(split);
 let first=plan.filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
 let rest=plan.filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
 let drawOrder=[...first,...rest],history=[];
 for(const t of drawOrder){
  let before=[...pools[t.drawSide]];
  if(!tryPlace(slots,t,pools[t.drawSide]))return null;
  history.push({...slots[Object.keys(slots).find(k=>slots[k].pre===t.pre)],box:t.drawSide,before});
 }
 return {slots,drawOrder:history};
}
function sameFirst(d){
 let c=0,p=[];
 initialPairs().forEach(([a,b,g])=>{
  let x=d.slots[a],y=d.slots[b];
  if(x&&y&&x.origRegion===y.origRegion){c++;p.push(`試合${g} ${x.pref}-${y.pref}(${x.origRegion})`)}
 });
 return {c,p};
}
function sim(){
 for(let k=0;k<8000;k++){
  let teams=makeTeams(),groups=groupTeams(teams);
  let hk=(groups['北海道']||[]).slice().sort((a,b)=>a.pre-b.pre);
  let targets=Object.keys(groups).filter(r=>r!=='北海道'&&r!=='関東東京'&&r!=='九州');
  let hkTarget=targets[Math.floor(Math.random()*targets.length)];
  groups[hkTarget]=[...(groups[hkTarget]||[]),...hk.map(t=>({...t,region:hkTarget,realRegion:'北海道',note:'北海道組込'}))];
  delete groups['北海道'];

  let rawOrder=sh(Object.keys(groups));
  let order=adjustOrderMinimal(rawOrder);
  let alloc=allocate(groups,order);
  if(alloc.cap.A!==0||alloc.cap.B!==0)continue;
  let placed=placePlan(alloc.plan,alloc.split);
  if(!placed)continue;
  let d={slots:placed.slots,teams:teams,rawOrder,order,hkTarget,allocFlow:alloc.flow,splitRegions:alloc.split,drawOrder:placed.drawOrder};
  if(Object.keys(d.slots).length===56 && sameFirst(d).c===0)return d;
 }
 // fallback
 let teams=makeTeams(),slots={};teams.forEach((t,i)=>slots[i+1]={...t,slot:i+1,drawSide:i<28?'A':'B'});return{slots,teams,rawOrder:[],order:[],hkTarget:'',allocFlow:[],splitRegions:[],drawOrder:Object.values(slots)}
}

function sourceForGame(no){
 for(const bl of blocks){
  let s=bl.slots;
  if(bl.no<=2){
   if(bl.r2[0]===no)return[{slot:s[0],label:`枠${s[0]}`},{slot:s[1],label:`枠${s[1]}`}];
   if(bl.r2[1]===no)return[{slot:s[2],label:`枠${s[2]}`},{slot:s[3],label:`枠${s[3]}`}];
  }else{
   for(let i=0;i<4;i++)if(bl.r1[i]===no)return[{slot:s[i*2],label:`枠${s[i*2]}`},{slot:s[i*2+1],label:`枠${s[i*2+1]}`}];
   if(bl.r2[0]===no)return[{game:bl.r1[0],label:`試合${bl.r1[0]}勝者`},{game:bl.r1[1],label:`試合${bl.r1[1]}勝者`}];
   if(bl.r2[1]===no)return[{game:bl.r1[2],label:`試合${bl.r1[2]}勝者`},{game:bl.r1[3],label:`試合${bl.r1[3]}勝者`}];
  }
  if(bl.r3===no)return[{game:bl.r2[0],label:`試合${bl.r2[0]}勝者`},{game:bl.r2[1],label:`試合${bl.r2[1]}勝者`}];
 }
 if(no>=49&&no<=52){let q=state.qf?.[no];return q?q.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'再抽選待ち'},{raw:true,label:'再抽選待ち'}]}
 if(no===53||no===54){let s=state.sf?.[no];return s?s.map(x=>({raw:true,team:x.team,label:x.label})):[{raw:true,label:'準決勝再抽選待ち'},{raw:true,label:'準決勝再抽選待ち'}]}
 if(no===55)return[{game:53,label:'試合53勝者'},{game:54,label:'試合54勝者'}];
 return [];
}
function resolve(src){if(src.raw)return src.team||null;if(src.slot)return current.slots[src.slot]||null;let g=state.games[src.game];return g?.winner||null}
function entrants(no){return sourceForGame(no).map(s=>({team:resolve(s),label:s.label}))}
function gstate(no){state.games[no]??={};return state.games[no]}
function cloneTeam(t){return t?{name:t.name,pref:t.pref,origRegion:t.origRegion,region:t.region,slot:t.slot,drawSide:t.drawSide}:null}
function setWinner(no,idx){
 let e=entrants(no)[idx];
 if(!e||!e.team){alert('勝者未確定です');return}
 state.games[no]??={};state.games[no].winner=cloneTeam(e.team);state.games[no].winnerIndex=idx;
 if(no>=41&&no<=48)assignQFForGame(no);
 if(no>=49&&no<=52)assignSFForGame(no);
 saveInputs();renderAll();
}
function saveInputs(){
 document.querySelectorAll('[data-date]').forEach(i=>gstate(+i.dataset.date).date=i.value);
 document.querySelectorAll('[data-score]').forEach(i=>gstate(+i.dataset.score)['score'+i.dataset.idx]=i.value);
 document.querySelectorAll('[data-note]').forEach(i=>gstate(+i.dataset.note).note=i.value);
 localStorage.setItem(LS_STATE,JSON.stringify(state));
}
function saveState(){saveInputs();alert('保存しました')}
function loadState(){try{state=JSON.parse(localStorage.getItem(LS_STATE)||'{"games":{},"qf":null,"sf":null}');state.games??={};state.qf??=null;state.sf??=null}catch(e){state={games:{},qf:null,sf:null}}}
function clearState(){if(confirm('進行を初期化しますか？')){state={games:{},qf:null,sf:null};localStorage.removeItem(LS_STATE);renderAll()}}

function row(no,e,idx,lot=false){
 let t=e.team,gs=gstate(no),picked=gs.winnerIndex==idx;
 return `<div class="team ${idx==0?'side1':'side3'} ${picked?'winrow':''}">
 <span class="src">${esc(lot?(e.label||''):(idx==0?'1塁側':'3塁側'))}</span>
 <span>${t?`<span class="tn">${esc(t.name)}</span> <span class="pref">(${esc(t.pref)})</span>`:`<span class="pending">${lot?'抽選待ち':'未定'}</span>`}</span>
 ${lot?'<span></span>':`<button class="pick ${picked?'picked':''}" onclick="setWinner(${no},${idx})">勝</button>`}
 </div>`;
}
function game(no,title,cls){
 let gs=gstate(no),es=entrants(no);
 return `<div class="game ${cls}"><div class="gl"><span>試合${no}</span><span>${esc(title)}</span></div>
 <div class="meta"><input class="date" data-date="${no}" placeholder="8/6 10:00" value="${esc(gs.date||'')}" onchange="saveInputs()"><span>スコア</span>
 <input class="score" data-score="${no}" data-idx="0" value="${esc(gs.score0||'')}" onchange="saveInputs()"> - 
 <input class="score" data-score="${no}" data-idx="1" value="${esc(gs.score1||'')}" onchange="saveInputs()">
 <input class="noteInput" data-note="${no}" placeholder="延長12回TB等" value="${esc(gs.note||'')}" onchange="saveInputs()"></div>
 ${row(no,es[0]||{},0)}${row(no,es[1]||{},1)}</div>`;
}
function gameLot(no,title,cls,reveal){
 let src=sourceForGame(no);
 let es=src.map(s=>({team:s.slot&&reveal.has(s.slot)?current.slots[s.slot]:null,label:s.label}));
 return `<div class="game ${cls}"><div class="gl"><span>試合${no}</span><span>${esc(title)}</span></div>${row(no,es[0]||{},0,true)}${row(no,es[1]||{},1,true)}</div>`;
}
function blockHTML(bl,lot=false,reveal=new Set()){
 let gf=lot?((n,t,c)=>gameLot(n,t,c,reveal)):game;
 let left='',mid='';
 if(bl.no<=2){mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}
 else{left=bl.r1.map(n=>gf(n,'1回戦','r1')).join('');mid=gf(bl.r2[0],'2回戦','r2')+gf(bl.r2[1],'2回戦','r2')}
 return `<div class="block"><div class="bt"><span>第${bl.no}ブロック</span><span>${esc(bl.start)}</span></div>
 <div class="tree"><div class="col">${left}</div><div class="col">${mid}</div><div class="col">${gf(bl.r3,'3回戦','r3')}</div></div></div>`;
}

function qEntry(no){let t=gstate(no).winner;return{label:'試合'+no+'勝者',team:cloneTeam(t),src:no}}
function blank(label){return{label,team:null,src:null}}
function ensureQF(){if(!state.qf){state.qf={49:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],50:[blank('41〜44勝者 抽選待ち'),blank('41〜44勝者 抽選待ち')],51:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')],52:[blank('45〜48勝者 抽選待ち'),blank('45〜48勝者 抽選待ち')]}}}
function assignEntry(map,no,positions){
 let ent=qEntry(no);if(!ent.team)return false;
 for(let p of positions){let e=map[p.m]?.[p.i];if(e&&e.src===no){map[p.m][p.i]=ent;return false}}
 let empty=positions.filter(p=>!map[p.m]?.[p.i]?.src);
 if(!empty.length)return false;
 let p=sh(empty)[0];map[p.m][p.i]=ent;return true;
}
function assignQFForGame(no){
 ensureQF();let changed=false;
 if(no>=41&&no<=44)changed=assignEntry(state.qf,no,[{m:49,i:0},{m:49,i:1},{m:50,i:0},{m:50,i:1}]);
 if(no>=45&&no<=48)changed=assignEntry(state.qf,no,[{m:51,i:0},{m:51,i:1},{m:52,i:0},{m:52,i:1}]);
 if(changed){state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}
 return changed;
}
function drawQF(){saveInputs();let any=false;for(let n=41;n<=48;n++)if(assignQFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の3回戦勝者はありません。既存配置は固定です。')}
function clearQF(){if(!confirm('準々決勝以降を解除しますか？'))return;state.qf=null;state.sf=null;[49,50,51,52,53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}
function ensureSF(){if(!state.sf){state.sf={53:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')],54:[blank('49〜52勝者 抽選待ち'),blank('49〜52勝者 抽選待ち')]}}}
function assignSFForGame(no){
 ensureSF();let changed=false;
 if(no>=49&&no<=52)changed=assignEntry(state.sf,no,[{m:53,i:0},{m:53,i:1},{m:54,i:0},{m:54,i:1}]);
 if(changed){[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}})}
 return changed;
}
function drawSF(){saveInputs();let any=false;for(let n=49;n<=52;n++)if(assignSFForGame(n))any=true;saveInputs();renderAll();showTab('finals');if(!any)alert('未抽選の準々決勝勝者はありません。既存配置は固定です。')}
function clearSF(){if(!confirm('準決勝以降を解除しますか？'))return;state.sf=null;[53,54,55].forEach(n=>{if(state.games[n]){delete state.games[n].winner;delete state.games[n].winnerIndex}});saveInputs();renderAll()}

function renderBracket(){bracket.innerHTML='<div class="note"><span class="pill" style="background:var(--r1)">1回戦1〜24</span><span class="pill" style="background:var(--r2)">2回戦25〜40</span><span class="pill" style="background:var(--r3)">3回戦41〜48</span></div><div class="blocks">'+blocks.map(b=>blockHTML(b)).join('')+'</div>'}
function renderFinals(){let h='<div class="note"><span class="pill" style="background:var(--qf)">準々決勝49〜52</span><span class="pill" style="background:var(--sf)">準決勝53〜54</span><span class="pill" style="background:var(--final)">決勝55</span><br>試合41〜44勝者は49/50へ、試合45〜48勝者は51/52へ再抽選。準決勝も通常大会同様に再抽選。</div><div class="finalGrid">';for(let n=49;n<=52;n++)h+=game(n,'準々決勝','qf');h+=game(53,'準決勝','sf')+game(54,'準決勝','sf')+game(55,'決勝','final')+'</div>';finals.innerHTML=h}
function renderList(){
 let h='<table><tr><th>枠</th><th>A/B</th><th>校名</th><th>代表</th><th>地区</th><th>本来地区</th><th>予備</th><th>備考</th></tr>';
 Object.values(current.slots).sort((a,b)=>a.slot-b.slot).forEach(t=>h+=`<tr class="${t.drawSide==='A'?'Arow':'Brow'}"><td>${t.slot}</td><td>${esc(t.drawSide)}</td><td>${esc(t.name)}</td><td>${esc(t.pref)}</td><td>${esc(t.region)}</td><td>${esc(t.origRegion)}</td><td>${t.pre}</td><td>${esc(t.note||'')}</td></tr>`);
 list.innerHTML=h+'</table>';
}

function buildSteps(){
 let st=[];
 st.push({title:'56代表がそろう',body:'記念大会の56代表を用意します。トーナメント表はまだ空です。',reveal:[]});
 let pre='<div class="lotterySlots">'+[...current.teams].sort((a,b)=>a.pre-b.pre).map(t=>`<div class="lotterySlot"><b>${t.pre}</b> ${esc(t.name)}<br><span class="small">${esc(t.pref)}／${esc(t.origRegion)}</span></div>`).join('')+'</div>';
 st.push({title:'予備抽選番号の付与',body:pre,html:true,reveal:[]});
 st.push({title:'北海道2代表の組み込み',body:`北北海道・南北海道を2校1組として、関東東京・九州以外の地区へ仮編入します。今回の組み込み先：${current.hkTarget||'未記録'}`,reveal:[]});
 st.push({title:'地区順抽選',body:`素の地区順：${(current.rawOrder||[]).join(' → ')}`,reveal:[]});
 st.push({title:'関東東京・九州の順番調整',body:`既存順をなるべく維持しつつ、関東東京・九州を4番目以内へ繰り上げます。確定順：${(current.order||[]).join(' → ')}`,reveal:[]});
 (current.allocFlow||[]).forEach((x,i)=>st.push({title:`A/B振分 ${i+1}`,body:x.text,reveal:[]}));
 st.push({title:'分割地区の確認',body:`分割地区：${(current.splitRegions||[]).join('・')||'なし'}。分割地区がある場合は、予備抽選番号の若い順に先に本抽選します。`,reveal:[]});
 let splitSet=new Set(current.splitRegions||[]);
 let splitTeams=(current.drawOrder||[]).filter(t=>splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
 let restTeams=(current.drawOrder||[]).filter(t=>!splitSet.has(t.region)).sort((a,b)=>a.pre-b.pre);
 splitTeams.forEach(t=>st.push({title:`分割地区本抽選 ${t.pre}番 ${t.pref}`,body:`${t.name} が${t.drawSide}箱から枠${t.slot}へ入ります。`,reveal:[t.slot]}));
 restTeams.forEach(t=>st.push({title:`本抽選 ${t.pre}番 ${t.pref}`,body:`${t.name} が${t.drawSide}箱から枠${t.slot}へ入ります。`,reveal:[t.slot]}));
 st.push({title:'3回戦までの事前抽選完了',body:'56代表の配置が完了しました。初戦同地区対決なしを確認済みです。',reveal:Object.keys(current.slots).map(Number)});
 return st;
}
function revealSet(){let s=new Set();for(let i=0;i<=step&&i<steps.length;i++)(steps[i].reveal||[]).forEach(x=>s.add(x));return s}
function renderLottery(){
 let cur=steps[step]||steps[0],pct=steps.length?((step+1)/steps.length*100):0,reveal=revealSet();
 let h=`<div class="small">手順 ${step+1}/${steps.length}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="bigStep">${esc(cur.title)}</div><div class="note">${cur.html?cur.body:esc(cur.body)}</div>`;
 h+=`<div class="stepList">${steps.map((s,i)=>`<div class="stepItem ${i<step?'done':i===step?'active':''}">${i+1}. ${esc(s.title)}</div>`).join('')}</div>`;
 h+=`<h4>現在のトーナメント表</h4><div class="blocks">${blocks.map(b=>blockHTML(b,true,reveal)).join('')}</div>`;
 lottery.innerHTML=h;
}
function renderAll(){
 let s=sameFirst(current),vals=Object.values(current.slots);
 summary.innerHTML=`配置 ${vals.length}/56 ${vals.length===56?'<span class=ok>OK</span>':'<span class=warn>要確認</span>'}<br>同地区初戦：<b>${s.c}</b>件<br>${s.p.join('<br>')||'なし'}<br>北海道組込：${esc(current.hkTarget||'')}<br>分割地区：${esc((current.splitRegions||[]).join('・')||'なし')}`;
 renderBracket();renderFinals();renderList();steps=buildSteps();if(step>=steps.length)step=steps.length-1;renderLottery();
}
function newDraw(){current=sim();state={games:{},qf:null,sf:null};step=0;renderAll();saveInputs()}
function stats(){let bad=0,max=0,miss=0;for(let i=0;i<1000;i++){let d=sim(),c=sameFirst(d).c;if(Object.keys(d.slots).length!==56)miss++;if(c)bad++;if(c>max)max=c}alert(`1000回検証\\n同地区初戦発生：${bad}/1000\\n最大：${max}\\n配置不足：${miss}/1000`)}
function showTab(n){['lottery','bracket','finals','names','list'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('hide',x!==n));if(n==='names')renderNameEditor()}
function nextStep(){step=Math.min(step+1,steps.length-1);renderLottery()}
function prevStep(){step=Math.max(step-1,0);renderLottery()}
function firstStep(){step=0;renderLottery()}
function lastStep(){step=steps.length-1;renderLottery()}
renderNameEditor();loadState();current=sim();renderAll();
</script>
